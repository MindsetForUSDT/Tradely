<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; height: 100vh; overflow: hidden; }

        .app { display: flex; height: 100vh; }

        /* Боковое меню */
        .sidebar {
            width: 280px;
            background: #12161E;
            border-right: 1px solid #1F232C;
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }
        .logo { font-size: 24px; font-weight: 800; padding: 0 24px 24px 24px; border-bottom: 1px solid #1F232C; margin-bottom: 24px; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .nav-menu { flex: 1; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            margin: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #A1A6B0;
            text-decoration: none;
        }
        .nav-item:hover { background: #1A1F2A; color: #FFFFFF; }
        .nav-item.active { background: rgba(94, 234, 212, 0.1); color: #5EEAD4; border-left: 3px solid #5EEAD4; }
        .nav-icon { font-size: 20px; width: 28px; }
        .nav-text { font-size: 15px; font-weight: 500; }

        .user-info {
            padding: 20px 24px;
            border-top: 1px solid #1F232C;
            margin-top: auto;
        }
        .username { font-weight: 600; margin-bottom: 8px; }
        .level { font-size: 12px; color: #7A8190; }
        .level-bar { background: #1F232C; border-radius: 10px; height: 6px; margin-top: 8px; overflow: hidden; }
        .level-fill { background: #5EEAD4; height: 100%; width: 0%; transition: width 0.3s; }

        /* Основной контент */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-header {
            padding: 24px 32px;
            border-bottom: 1px solid #1F232C;
            background: #0A0C10;
        }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .page-description { color: #7A8190; font-size: 14px; }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        /* Карточки-виджеты */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: #5EEAD4; }
        .stat-label { font-size: 12px; color: #7A8190; margin-top: 8px; }

        .recent-activity {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 20px;
        }
        .recent-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1F232C;
            font-size: 14px;
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-text { color: #A1A6B0; }
        .activity-date { color: #7A8190; font-size: 12px; }

        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .nav-text, .user-info .username, .user-info .level { display: none; }
            .logo { font-size: 20px; text-align: center; padding: 0 12px 20px 12px; }
            .nav-item { justify-content: center; padding: 14px 0; margin: 4px 8px; }
            .content-header { padding: 20px; }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo">Trade<span style="color: #5EEAD4;">um</span></div>
        <div class="nav-menu">
            <a href="#" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Главная</span>
            </a>
            <a href="#" class="nav-item" data-page="learn">
                <span class="nav-icon">📚</span>
                <span class="nav-text">Обучение</span>
            </a>
            <a href="#" class="nav-item" data-page="duel">
                <span class="nav-icon">⚔️</span>
                <span class="nav-text">Дуэли</span>
            </a>
            <a href="#" class="nav-item" data-page="library">
                <span class="nav-icon">📖</span>
                <span class="nav-text">Библиотека</span>
            </a>
            <a href="#" class="nav-item" data-page="simulator">
                <span class="nav-icon">🎮</span>
                <span class="nav-text">Симулятор</span>
            </a>
            <a href="#" class="nav-item" data-page="leaderboard">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">Рейтинг</span>
            </a>
        </div>
        <div class="user-info">
            <div class="username" id="username">—</div>
            <div class="level" id="levelText">Уровень 1</div>
            <div class="level-bar"><div class="level-fill" id="levelFill"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <div class="page-title" id="pageTitle">Главная</div>
            <div class="page-description" id="pageDescription">Добро пожаловать в Tradeum Academy</div>
        </div>
        <div class="content-area" id="contentArea">
            <!-- Контент загружается динамически -->
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="statXp">0</div><div class="stat-label">Опыт (XP)</div></div>
                <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div class="stat-label">🔥 Серия</div></div>
                <div class="stat-card"><div class="stat-value" id="statAccuracy">0%</div><div class="stat-label">Точность</div></div>
                <div class="stat-card"><div class="stat-value" id="statCards">0</div><div class="stat-label">Пройдено карт</div></div>
            </div>
            <div class="recent-activity">
                <div class="recent-title">📋 Последняя активность</div>
                <div id="recentActivity"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const userId = {{ user_id }};
    let currentPage = 'dashboard';

    async function loadStats() {
        try {
            const res = await fetch(`/api/user/stats/${userId}`);
            const stats = await res.json();
            document.getElementById('username').innerText = stats.username;
            document.getElementById('levelText').innerText = `Уровень ${stats.level}`;
            document.getElementById('levelFill').style.width = `${stats.progress_percent}%`;
            document.getElementById('statXp').innerText = stats.experience;
            document.getElementById('statStreak').innerText = stats.current_streak;
            document.getElementById('statAccuracy').innerText = `${Math.round(stats.accuracy)}%`;
            document.getElementById('statCards').innerText = `${stats.cards_completed}/${stats.total_cards}`;
        } catch(e) { console.error(e); }
    }

    async function loadPage(page) {
        currentPage = page;
        const titles = {
            dashboard: { title: 'Главная', desc: 'Добро пожаловать в Tradeum Academy — твой путь к мастерству трейдинга' },
            learn: { title: 'Обучение', desc: 'Изучай паттерны, анализируй графики и принимай правильные решения' },
            duel: { title: 'Дуэли', desc: 'Соревнуйся с другими трейдерами и докажи своё мастерство' },
            library: { title: 'Библиотека', desc: 'Коллекция торговых паттернов и стратегий для изучения' },
            simulator: { title: 'Симулятор', desc: 'Тренируйся на исторических данных без риска' },
            leaderboard: { title: 'Рейтинг', desc: 'Таблица лидеров среди всех трейдеров платформы' }
        };
        document.getElementById('pageTitle').innerText = titles[page].title;
        document.getElementById('pageDescription').innerText = titles[page].desc;

        if (page === 'dashboard') {
            document.getElementById('contentArea').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="statXp2">0</div><div class="stat-label">Опыт (XP)</div></div>
                    <div class="stat-card"><div class="stat-value" id="statStreak2">0</div><div class="stat-label">🔥 Серия</div></div>
                    <div class="stat-card"><div class="stat-value" id="statAccuracy2">0%</div><div class="stat-label">Точность</div></div>
                    <div class="stat-card"><div class="stat-value" id="statCards2">0</div><div class="stat-label">Пройдено карт</div></div>
                </div>
                <div class="recent-activity">
                    <div class="recent-title">📋 Что нового?</div>
                    <div id="recentActivity"></div>
                </div>
            `;
            await loadStats();
            document.getElementById('statXp2').innerText = document.getElementById('statXp').innerText;
            document.getElementById('statStreak2').innerText = document.getElementById('statStreak').innerText;
            document.getElementById('statAccuracy2').innerText = document.getElementById('statAccuracy').innerText;
            document.getElementById('statCards2').innerText = document.getElementById('statCards').innerText;
            document.getElementById('recentActivity').innerHTML = `
                <div class="activity-item"><span class="activity-text">✅ Добро пожаловать в Tradeum Academy!</span><span class="activity-date">Только что</span></div>
                <div class="activity-item"><span class="activity-text">📚 Начни обучение с первой карточки</span><span class="activity-date">—</span></div>
                <div class="activity-item"><span class="activity-text">⚔️ Испытай себя в дуэлях с другими трейдерами</span><span class="activity-date">—</span></div>
            `;
        } else if (page === 'learn') {
            const res = await fetch(`/api/cards/random?user_id=${userId}`);
            const card = await res.json();
            document.getElementById('contentArea').innerHTML = `
                <div id="learnContainer" style="background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <h2 id="cardTitle">${card.title || 'Загрузка...'}</h2>
                        <span class="difficulty" id="difficulty">${card.difficulty === 'easy' ? 'ЛЕГКИЙ' : (card.difficulty === 'medium' ? 'СРЕДНИЙ' : 'СЛОЖНЫЙ')}</span>
                    </div>
                    <p id="description" style="color: #A1A6B0; margin-bottom: 24px;">${card.description || ''}</p>
                    <div class="chart-container" style="background: #0A0C10; border-radius: 16px; padding: 20px; margin-bottom: 24px;">
                        <canvas id="priceChart" style="width: 100%; height: 300px;"></canvas>
                    </div>
                    <div style="background: #0A0C10; border-radius: 16px; padding: 20px; margin-bottom: 24px;">
                        <div style="font-weight: 600; margin-bottom: 12px;">📰 Новости рынка</div>
                        <ul id="newsList" style="list-style: none;"></ul>
                    </div>
                    <div class="prediction-btns" style="display: flex; gap: 15px; justify-content: center; margin-bottom: 24px;">
                        <button class="pred-btn up" data-dir="up" style="background: #0A0C10; border: 1px solid #5EEAD4; color: #5EEAD4; padding: 12px 28px; border-radius: 40px; cursor: pointer;">📈 ВВЕРХ</button>
                        <button class="pred-btn down" data-dir="down" style="background: #0A0C10; border: 1px solid #F87171; color: #F87171; padding: 12px 28px; border-radius: 40px; cursor: pointer;">📉 ВНИЗ</button>
                        <button class="pred-btn sideways" data-dir="sideways" style="background: #0A0C10; border: 1px solid #F4B740; color: #F4B740; padding: 12px 28px; border-radius: 40px; cursor: pointer;">➡️ БОКОВИК</button>
                    </div>
                    <div id="resultBox" style="background: #0A0C10; border-radius: 16px; padding: 20px; display: none;"></div>
                    <button id="nextBtn" style="width: 100%; padding: 14px; background: #5EEAD4; color: #0A0C10; border: none; border-radius: 40px; font-weight: 700; cursor: pointer; display: none;">➡️ СЛЕДУЮЩАЯ КАРТОЧКА</button>
                </div>
            `;
            if (card.id) await initLearnCard(card);
        } else if (page === 'duel') {
            document.getElementById('contentArea').innerHTML = `
                <div style="background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 20px;">⚔️</div>
                    <h2 style="margin-bottom: 16px;">Дуэли трейдеров</h2>
                    <p style="color: #A1A6B0; margin-bottom: 32px;">Соревнуйся с другими трейдерами в реальном времени</p>
                    <button id="startDuelBtn" style="background: #5EEAD4; color: #0A0C10; border: none; padding: 14px 40px; border-radius: 40px; font-weight: 700; cursor: pointer;">🔍 НАЙТИ СОПЕРНИКА</button>
                    <div id="duelStatus" style="margin-top: 24px; color: #7A8190;"></div>
                    <div id="duelContainer" style="margin-top: 24px; display: none;">
                        <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                            <div style="flex: 1; background: #0A0C10; border-radius: 20px; padding: 24px; text-align: center;">
                                <div style="font-weight: 700; margin-bottom: 8px;">Вы</div>
                                <div style="font-size: 28px; color: #5EEAD4;" id="myRating">—</div>
                                <div id="myPredictionArea" style="margin-top: 20px;">
                                    <div style="display: flex; gap: 12px; justify-content: center;">
                                        <button class="duel-pred up" data-dir="up" style="background: #0A0C10; border: 1px solid #5EEAD4; color: #5EEAD4; padding: 10px 20px; border-radius: 30px; cursor: pointer;">📈</button>
                                        <button class="duel-pred down" data-dir="down" style="background: #0A0C10; border: 1px solid #F87171; color: #F87171; padding: 10px 20px; border-radius: 30px; cursor: pointer;">📉</button>
                                    </div>
                                </div>
                                <div id="myPredictionDisplay" style="margin-top: 16px; color: #7A8190;"></div>
                            </div>
                            <div style="flex: 1; background: #0A0C10; border-radius: 20px; padding: 24px; text-align: center;">
                                <div style="font-weight: 700; margin-bottom: 8px;">Соперник</div>
                                <div style="font-size: 28px; color: #F4B740;" id="opponentRating">—</div>
                                <div id="opponentPredictionDisplay" style="margin-top: 16px; color: #7A8190;"></div>
                            </div>
                        </div>
                        <div class="timer" style="font-size: 48px; font-weight: 700; text-align: center; margin: 20px 0;">30</div>
                        <button id="resolveDuelBtn" style="background: #5EEAD4; color: #0A0C10; border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; display: none;">ГОТОВО</button>
                    </div>
                </div>
            `;
            initDuel();
        } else if (page === 'library') {
            document.getElementById('contentArea').innerHTML = `
                <div style="background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px;">
                    <h2 style="margin-bottom: 24px;">📖 Библиотека паттернов</h2>
                    <div class="patterns-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;" id="patternsGrid"></div>
                </div>
            `;
            const patterns = [
                { name: "Пробой уровня", desc: "Цена пробивает ключевой уровень на объемах", type: "bullish" },
                { name: "Медвежье поглощение", desc: "Свечная модель разворота на вершине", type: "bearish" },
                { name: "Ложный пробой", desc: "Пробой уровня с последующим возвратом", type: "bullish" },
                { name: "Дивергенция RSI", desc: "Расхождение цены и осциллятора", type: "bearish" },
                { name: "Сжатие Боллинджера", desc: "Низкая волатильность перед движением", type: "neutral" },
                { name: "Золотой крест", desc: "Пересечение MA 50 выше MA 200", type: "bullish" },
                { name: "Голова и плечи", desc: "Классический разворотный паттерн", type: "bearish" },
                { name: "Восходящий треугольник", desc: "Бычья фигура продолжения", type: "bullish" }
            ];
            document.getElementById('patternsGrid').innerHTML = patterns.map(p => `
                <div style="background: #0A0C10; border-radius: 16px; padding: 20px; border-left: 3px solid ${p.type === 'bullish' ? '#5EEAD4' : (p.type === 'bearish' ? '#F87171' : '#F4B740')}">
                    <div style="font-weight: 700; margin-bottom: 8px;">${p.name}</div>
                    <div style="font-size: 13px; color: #7A8190;">${p.desc}</div>
                </div>
            `).join('');
        } else if (page === 'simulator') {
            document.getElementById('contentArea').innerHTML = `
                <div style="background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 20px;">🎮</div>
                    <h2 style="margin-bottom: 16px;">Торговый симулятор</h2>
                    <p style="color: #A1A6B0; margin-bottom: 24px;">Тренируйся на исторических данных без риска</p>
                    <button id="startSimulatorBtn" style="background: #5EEAD4; color: #0A0C10; border: none; padding: 14px 40px; border-radius: 40px; font-weight: 700; cursor: pointer;">🚀 ЗАПУСТИТЬ СИМУЛЯТОР</button>
                    <div id="simulatorInfo" style="margin-top: 24px; color: #7A8190;">В разработке</div>
                </div>
            `;
        } else if (page === 'leaderboard') {
            const res = await fetch('/api/leaderboard');
            const leaders = await res.json();
            document.getElementById('contentArea').innerHTML = `
                <div style="background: #12161E; border: 1px solid #1F232C; border-radius: 24px; overflow: hidden;">
                    <div style="display: grid; grid-template-columns: 80px 1fr 100px 100px; padding: 16px 24px; background: #0A0C10; color: #7A8190; font-size: 12px; font-weight: 600;">
                        <div>Место</div><div>Трейдер</div><div>Уровень</div><div>Опыт</div>
                    </div>
                    <div id="leaderboardList"></div>
                </div>
            `;
            const container = document.getElementById('leaderboardList');
            container.innerHTML = leaders.map((l, idx) => `
                <div style="display: grid; grid-template-columns: 80px 1fr 100px 100px; padding: 14px 24px; border-bottom: 1px solid #1F232C;">
                    <div style="color: #F4B740; font-weight: 700;">#${idx + 1}</div>
                    <div>${l.username}</div>
                    <div>${l.level}</div>
                    <div>${l.experience_points}</div>
                </div>
            `).join('');
        }
    }

    async function initLearnCard(card) {
        let chart = null;
        let canAnswer = true;

        const ctx = document.getElementById('priceChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: card.chart_points.map((_, i) => i), datasets: [{ label: 'Цена', data: card.chart_points.map(p => p.y), borderColor: '#5EEAD4', backgroundColor: 'rgba(94, 234, 212, 0.05)', fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: '#5EEAD4' }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#A1A6B0' } } }, scales: { y: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0', callback: (v) => `$${v.toFixed(0)}` } }, x: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0' } } } }
        });

        const newsList = document.getElementById('newsList');
        newsList.innerHTML = card.news.map(n => `<li style="padding: 8px 0; border-bottom: 1px solid #1F232C; color: #A1A6B0;">${n}</li>`).join('');

        document.querySelectorAll('.pred-btn').forEach(btn => {
            btn.onclick = async () => {
                if (!canAnswer) return;
                canAnswer = false;
                const direction = btn.dataset.dir;
                document.querySelectorAll('.pred-btn').forEach(b => b.style.opacity = '0.5');
                try {
                    const res = await fetch('/api/cards/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId, card_id: card.id, answer: direction })
                    });
                    const data = await res.json();
                    const resultBox = document.getElementById('resultBox');
                    if (data.is_correct) {
                        resultBox.style.display = 'block';
                        resultBox.style.borderLeft = '4px solid #5EEAD4';
                        resultBox.innerHTML = `<div style="color: #5EEAD4; font-weight: 700;">✅ ПРАВИЛЬНО!</div><div style="margin-top: 8px;">${data.explanation}</div><div style="margin-top: 8px; color: #5EEAD4;">+${data.xp_earned} XP</div>`;
                    } else {
                        resultBox.style.display = 'block';
                        resultBox.style.borderLeft = '4px solid #F87171';
                        resultBox.innerHTML = `<div style="color: #F87171; font-weight: 700;">❌ НЕПРАВИЛЬНО</div><div style="margin-top: 8px;">${data.explanation}</div><div style="margin-top: 8px; color: #7A8190;">Правильный ответ: ${data.correct_answer === 'up' ? 'ВВЕРХ' : (data.correct_answer === 'down' ? 'ВНИЗ' : 'БОКОВИК')}</div>`;
                    }
                    document.getElementById('nextBtn').style.display = 'block';
                    await loadStats();
                } catch(e) { console.error(e); }
            };
        });

        document.getElementById('nextBtn').onclick = () => { window.location.reload(); };
    }

    let duelId = null, duelTimer = null, duelCheckInterval = null;

    async function initDuel() {
        document.getElementById('startDuelBtn').onclick = async () => {
            const btn = document.getElementById('startDuelBtn');
            btn.disabled = true;
            btn.textContent = '⏳ ПОИСК...';
            try {
                const res = await fetch('/api/duel/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
                const data = await res.json();
                if (data.success) {
                    duelId = data.duel_id;
                    document.getElementById('duelContainer').style.display = 'block';
                    document.getElementById('duelStatus').innerHTML = data.action === 'joined' ? '✅ Соперник найден! Делайте прогноз' : '⏳ Ожидание соперника...';
                    if (data.action === 'joined') startDuel();
                    else waitForOpponent();
                }
            } catch(e) { console.error(e); }
        };
    }

    async function waitForOpponent() {
        const interval = setInterval(async () => {
            const res = await fetch(`/api/duel/check/${duelId}`);
            const data = await res.json();
            if (data.both_submitted) { clearInterval(interval); resolveDuel(); }
            else if (data.player2_prediction !== null) { clearInterval(interval); startDuel(); }
        }, 2000);
    }

    async function startDuel() {
        document.getElementById('duelStatus').innerHTML = '⚔️ ДУЭЛЬ НАЧАЛАСЬ! Сделайте прогноз';
        let timeLeft = 30;
        const timerElem = document.querySelector('.timer');
        duelTimer = setInterval(() => { timerElem.innerText = timeLeft; if (timeLeft <= 0) { clearInterval(duelTimer); resolveDuel(); } timeLeft--; }, 1000);

        document.querySelectorAll('.duel-pred').forEach(btn => {
            btn.onclick = async () => {
                const direction = btn.dataset.dir;
                const res = await fetch('/api/duel/submit_prediction', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ duel_id: duelId, user_id: userId, direction }) });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('myPredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                    document.getElementById('myPredictionArea').style.display = 'none';
                    document.getElementById('duelStatus').innerHTML = '✅ Прогноз принят. Ожидаем соперника...';
                    duelCheckInterval = setInterval(async () => {
                        const checkRes = await fetch(`/api/duel/check/${duelId}`);
                        const checkData = await checkRes.json();
                        if (checkData.both_submitted) { clearInterval(duelCheckInterval); resolveDuel(); }
                    }, 1000);
                }
            };
        });
    }

    async function resolveDuel() {
        clearInterval(duelTimer); clearInterval(duelCheckInterval);
        const res = await fetch('/api/duel/resolve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ duel_id: duelId }) });
        const data = await res.json();
        const resultText = data.winner_id == userId ? '🎉 ПОБЕДА!' : (data.winner_id ? '😔 ПОРАЖЕНИЕ' : '🤝 НИЧЬЯ');
        document.getElementById('duelStatus').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА! ${resultText}<br>Реальное движение: ${data.real_direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
        document.getElementById('resolveDuelBtn').style.display = 'block';
        document.getElementById('resolveDuelBtn').onclick = () => { window.location.reload(); };
        await loadStats();
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            loadPage(item.dataset.page);
        });
    });

    loadStats();
    loadPage('dashboard');
</script>
</body>
</html>
