<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tradeum · Главная</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; height: 100vh; overflow: hidden; }

        .app { display: flex; height: 100vh; }

        /* ========== БОКОВОЕ МЕНЮ ========== */
        .sidebar {
            width: 280px;
            background: #12161E;
            border-right: 1px solid #1F232C;
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            transition: width 0.3s ease;
        }
        .logo { font-size: 24px; font-weight: 800; padding: 0 24px 24px 24px; border-bottom: 1px solid #1F232C; margin-bottom: 24px; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }

        /* Горизонтальный скролл для навигации на мобилках */
        .nav-menu { flex: 1; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            margin: 4px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #A1A6B0;
            text-decoration: none;
        }
        .nav-item:hover { background: #1A1F2A; color: #FFFFFF; }
        .nav-item.active { background: rgba(94, 234, 212, 0.1); color: #5EEAD4; border-left: 3px solid #5EEAD4; }
        .nav-icon { font-size: 20px; width: 28px; }
        .nav-text { font-size: 15px; font-weight: 500; }

        .user-info {
            padding: 20px 24px;
            border-top: 1px solid #1F232C;
            margin-top: auto;
        }
        .username { font-weight: 600; margin-bottom: 8px; }
        .level { font-size: 12px; color: #7A8190; }
        .level-bar { background: #1F232C; border-radius: 10px; height: 6px; margin-top: 8px; overflow: hidden; }
        .level-fill { background: #5EEAD4; height: 100%; width: 0%; transition: width 0.3s; }

        /* ========== ОСНОВНОЙ КОНТЕНТ ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-header {
            padding: 24px 32px;
            border-bottom: 1px solid #1F232C;
            background: #0A0C10;
        }
        .page-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .page-description { color: #7A8190; font-size: 14px; }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }

        /* Карточки-виджеты */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
        }
        .stat-card.visible { opacity: 1; transform: translateY(0); }
        .stat-value { font-size: 32px; font-weight: 700; color: #5EEAD4; }
        .stat-label { font-size: 12px; color: #7A8190; margin-top: 8px; }

        .recent-activity {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .recent-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .activity-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #1F232C;
            font-size: 14px;
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-text { color: #A1A6B0; }
        .activity-date { color: #7A8190; font-size: 12px; }

        /* Слайдер "Часто изучают" */
        .popular-slider-section {
            margin-bottom: 32px;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .slider-title {
            font-size: 18px;
            font-weight: 600;
        }
        .slider-nav {
            display: flex;
            gap: 12px;
        }
        .slider-btn {
            background: #1F232C;
            border: none;
            color: #A1A6B0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .slider-btn:hover {
            background: #5EEAD4;
            color: #0A0C10;
        }
        .patterns-slider {
            overflow: hidden;
            border-radius: 20px;
        }
        .patterns-slider .swiper-slide {
            width: auto;
        }
        .slider-pattern-card {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 20px;
            width: 260px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .slider-pattern-card:hover {
            transform: translateY(-4px);
            border-color: #5EEAD4;
        }
        .pattern-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .pattern-type.bullish { background: rgba(94, 234, 212, 0.1); color: #5EEAD4; }
        .pattern-type.bearish { background: rgba(248, 113, 113, 0.1); color: #F87171; }
        .pattern-type.neutral { background: rgba(244, 183, 64, 0.1); color: #F4B740; }
        .slider-pattern-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .slider-pattern-desc { color: #A1A6B0; font-size: 13px; line-height: 1.4; margin-bottom: 12px; }

        /* Стили для обучения */
        .card-container { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .card-title { font-size: 24px; font-weight: 700; }
        .difficulty { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .difficulty.easy { background: rgba(94, 234, 212, 0.1); color: #5EEAD4; }
        .difficulty.medium { background: rgba(244, 183, 64, 0.1); color: #F4B740; }
        .difficulty.hard { background: rgba(248, 113, 113, 0.1); color: #F87171; }
        .description { color: #A1A6B0; margin-bottom: 24px; line-height: 1.6; }
        .chart-container { background: #0A0C10; border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        canvas { width: 100% !important; height: 300px !important; }
        .news-section { background: #0A0C10; border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        .news-title { font-weight: 600; margin-bottom: 12px; color: #5EEAD4; }
        .news-list { list-style: none; }
        .news-list li { padding: 8px 0; border-bottom: 1px solid #1F232C; color: #A1A6B0; }
        .prediction-btns { display: flex; gap: 15px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
        .pred-btn { padding: 12px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; transition: all 0.3s; background: #0A0C10; border: none; }
        .pred-btn.up { border: 1px solid #5EEAD4; color: #5EEAD4; }
        .pred-btn.up:hover { background: #5EEAD4; color: #0A0C10; }
        .pred-btn.down { border: 1px solid #F87171; color: #F87171; }
        .pred-btn.down:hover { background: #F87171; color: #0A0C10; }
        .pred-btn.sideways { border: 1px solid #F4B740; color: #F4B740; }
        .pred-btn.sideways:hover { background: #F4B740; color: #0A0C10; }
        .result-box { background: #0A0C10; border-radius: 16px; padding: 20px; margin-bottom: 24px; display: none; }
        .result-box.correct { border-left: 4px solid #5EEAD4; display: block; }
        .result-box.wrong { border-left: 4px solid #F87171; display: block; }
        .result-title { font-weight: 700; margin-bottom: 8px; }
        .next-btn { width: 100%; padding: 14px; background: #5EEAD4; color: #0A0C10; border: none; border-radius: 40px; font-weight: 700; cursor: pointer; display: none; }

        /* Стили для дуэлей */
        .mode-selector { display: flex; gap: 16px; margin-bottom: 24px; }
        .mode-btn { flex: 1; padding: 16px; background: #12161E; border: 1px solid #1F232C; border-radius: 16px; color: #A1A6B0; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.3s; }
        .mode-btn.active { background: #5EEAD4; color: #0A0C10; border-color: #5EEAD4; }
        .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .bot-card { background: #12161E; border: 1px solid #1F232C; border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .bot-card:hover { border-color: #F4B740; transform: translateY(-2px); }
        .bot-card.selected { border-color: #F4B740; background: rgba(244, 183, 64, 0.05); }
        .bot-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .bot-rating { font-size: 24px; font-weight: 700; color: #F4B740; margin-bottom: 8px; }
        .bot-desc { font-size: 12px; color: #7A8190; }
        .duel-container { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; margin-top: 24px; display: none; }
        .players { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
        .player-card { flex: 1; background: #0A0C10; border-radius: 20px; padding: 24px; text-align: center; }
        .player-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .player-rating { font-size: 28px; font-weight: 700; color: #5EEAD4; margin-bottom: 20px; }
        .duel-pred { padding: 12px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; background: #0A0C10; border: none; margin: 0 5px; }
        .duel-pred.up { border: 1px solid #5EEAD4; color: #5EEAD4; }
        .duel-pred.up:hover { background: #5EEAD4; color: #0A0C10; }
        .duel-pred.down { border: 1px solid #F87171; color: #F87171; }
        .duel-pred.down:hover { background: #F87171; color: #0A0C10; }
        .timer { font-size: 48px; font-weight: 700; text-align: center; margin: 20px 0; font-family: monospace; }
        .duel-status { text-align: center; padding: 16px; background: #0A0C10; border-radius: 16px; margin-top: 20px; color: #7A8190; }
        .find-btn { width: 100%; padding: 16px; background: #5EEAD4; color: #0A0C10; border: none; border-radius: 40px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 16px; transition: all 0.3s; }
        .find-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(94, 234, 212, 0.3); }
        .hidden { display: none; }

        /* Библиотека паттернов */
        .patterns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .library-pattern-card {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
        }
        .library-pattern-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .library-pattern-card:hover {
            transform: translateY(-4px);
            border-color: #5EEAD4;
        }

        /* Симулятор */
        .balance { font-size: 36px; font-weight: 700; color: #5EEAD4; text-align: center; margin-bottom: 24px; }
        .trade-panel { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
        .trade-btn { padding: 12px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; border: none; transition: all 0.3s; }
        .trade-btn.long { background: #5EEAD4; color: #0A0C10; }
        .trade-btn.long:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(94, 234, 212, 0.3); }
        .trade-btn.short { background: #F87171; color: #0A0C10; }
        .trade-btn.short:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(248, 113, 113, 0.3); }
        .trade-btn.reset { background: #2E3440; color: #E6E8EC; }
        .result-positive { color: #5EEAD4; }
        .result-negative { color: #F87171; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1F232C; font-size: 14px; flex-wrap: wrap; gap: 10px; }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 24px;
            border-radius: 12px;
            background: #1A1F2A;
            border-left: 3px solid;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .notification.success { border-color: #5EEAD4; background: rgba(94, 234, 212, 0.1); }
        .notification.error { border-color: #F87171; background: rgba(248, 113, 113, 0.1); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Кнопка вверх */
        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #5EEAD4;
            color: #0A0C10;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 99;
            box-shadow: 0 4px 15px rgba(94, 234, 212, 0.3);
        }
        .scroll-top-btn.show {
            opacity: 1;
            visibility: visible;
        }
        .scroll-top-btn:hover {
            transform: translateY(-3px);
        }

        /* Плавающая кнопка поддержки */
        .support-fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #F4B740;
            color: #0A0C10;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: all 0.3s;
            z-index: 99;
            box-shadow: 0 4px 15px rgba(244, 183, 64, 0.3);
        }
        .support-fab:hover {
            transform: scale(1.05);
        }

        /* Адаптация */
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .nav-text, .user-info .username, .user-info .level { display: none; }
            .logo { font-size: 20px; text-align: center; padding: 0 12px 20px 12px; }
            .nav-item { justify-content: center; padding: 14px 0; margin: 4px 8px; }
            .content-header { padding: 20px; }
            .content-area { padding: 20px; }

            /* Горизонтальный скролл навигации */
            .nav-menu {
                overflow-x: auto;
                white-space: nowrap;
                display: flex;
                flex-wrap: nowrap;
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch;
            }
            .nav-menu .nav-item {
                display: inline-flex;
                flex-shrink: 0;
                white-space: nowrap;
            }
            .nav-menu::-webkit-scrollbar { display: none; }
            .nav-menu { -ms-overflow-style: none; scrollbar-width: none; }

            .scroll-top-btn { bottom: 20px; right: 20px; width: 45px; height: 45px; font-size: 20px; }
            .support-fab { bottom: 20px; left: 20px; width: 45px; height: 45px; font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo">Trade<span style="color: #5EEAD4;">um</span></div>
        <div class="nav-menu">
            <div class="nav-item active" data-page="dashboard">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Главная</span>
            </div>
            <div class="nav-item" data-page="learn">
                <span class="nav-icon">📚</span>
                <span class="nav-text">Обучение</span>
            </div>
            <div class="nav-item" data-page="duel">
                <span class="nav-icon">⚔️</span>
                <span class="nav-text">Дуэли</span>
            </div>
            <div class="nav-item" data-page="library">
                <span class="nav-icon">📖</span>
                <span class="nav-text">Библиотека</span>
            </div>
            <div class="nav-item" data-page="simulator">
                <span class="nav-icon">🎮</span>
                <span class="nav-text">Симулятор</span>
            </div>
            <div class="nav-item" data-page="leaderboard">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">Рейтинг</span>
            </div>
        </div>
        <div class="user-info">
            <div class="username" id="username">—</div>
            <div class="level" id="levelText">Уровень 1</div>
            <div class="level-bar"><div class="level-fill" id="levelFill"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <div class="page-title" id="pageTitle">Главная</div>
            <div class="page-description" id="pageDescription">Добро пожаловать в Tradeum Academy</div>
        </div>
        <div class="content-area" id="contentArea">
            <!-- Контент загружается динамически -->
        </div>
    </div>
</div>

<!-- Кнопка "Вверх" -->
<button class="scroll-top-btn" id="scrollTopBtn" aria-label="Наверх">↑</button>

<!-- Плавающая кнопка поддержки -->
<button class="support-fab" id="supportBtn" aria-label="Поддержка">💬</button>

<script>
    const userId = {{ user_id }};
    let currentPage = 'dashboard';
    let currentCard = null;
    let chart = null;
    let canAnswer = true;

    // Боты для дуэлей
    const bots = [
        { id: 1, name: "Трендовый Аналитик", rating: 580, desc: "Специализируется на определении трендов", accuracy: 0.65 },
        { id: 2, name: "Контрарный Торговец", rating: 520, desc: "Ищет развороты на перекупленности", accuracy: 0.55 },
        { id: 3, name: "Волатильный Мастер", rating: 610, desc: "Идеален для нестабильного рынка", accuracy: 0.70 },
        { id: 4, name: "Скальпер", rating: 490, desc: "Быстрые решения на малых таймфреймах", accuracy: 0.50 },
        { id: 5, name: "Фундаментальный Бот", rating: 550, desc: "Анализирует новости и события", accuracy: 0.60 }
    ];

    // Паттерны для библиотеки и слайдера
    const patterns = [
        { name: "Пробой уровня сопротивления", type: "bullish", desc: "Цена пробивает ключевой уровень на объемах", signal: "Бычий сигнал. Ожидается продолжение роста." },
        { name: "Медвежье поглощение", type: "bearish", desc: "Свечная модель разворота на вершине тренда", signal: "Медвежий сигнал. Ожидается разворот вниз." },
        { name: "Ложный пробой", type: "bullish", desc: "Пробой уровня с быстрым возвратом", signal: "Бычий сигнал. Ловушка для продавцов." },
        { name: "Дивергенция RSI", type: "bearish", desc: "Расхождение цены и осциллятора", signal: "Медвежий сигнал. Возможен разворот." },
        { name: "Сжатие полос Боллинджера", type: "neutral", desc: "Низкая волатильность перед движением", signal: "Ожидается сильное движение." },
        { name: "Золотой крест", type: "bullish", desc: "MA50 пересекает MA200 снизу вверх", signal: "Долгосрочный бычий сигнал." },
        { name: "Голова и плечи", type: "bearish", desc: "Классический разворотный паттерн", signal: "Медвежий сигнал. Разворот тренда." },
        { name: "Восходящий треугольник", type: "bullish", desc: "Горизонтальное сопротивление и восходящая поддержка", signal: "Бычий сигнал. Пробой вверх." },
        { name: "Нисходящий треугольник", type: "bearish", desc: "Горизонтальная поддержка и нисходящее сопротивление", signal: "Медвежий сигнал. Пробой вниз." },
        { name: "Двойное дно", type: "bullish", desc: "Разворотная модель после нисходящего тренда", signal: "Бычий сигнал. Разворот вверх." }
    ];

    // Уведомления
    function showNotification(msg, type) {
        const div = document.createElement('div');
        div.className = `notification ${type}`;
        div.innerHTML = `<span style="margin-right: 10px;">${type === 'success' ? '✅' : '❌'}</span>${msg}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    // Плавное появление карточек
    function initIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

        document.querySelectorAll('.stat-card, .library-pattern-card, .feature-card').forEach(el => {
            observer.observe(el);
        });
    }

    // Загрузка статистики
    async function loadStats() {
        try {

    // Функция для показа модального окна с паттерном
    window.showPatternModal = function(name, desc, signal) {
        showNotification(`${name}: ${signal}`, 'success');
        alert(`${name}\n\n${desc}\n\n🎯 ${signal}`);
    }

    // Загрузка карточки обучения
    async function loadLearnCard() {
        try {
            const res = await fetch(`/api/cards/random?user_id=${userId}`);
            const card = await res.json();
            if (card.completed_all) {
                document.getElementById('cardTitle').innerText = 'Поздравляем!';
                document.getElementById('description').innerHTML = 'Вы прошли все карточки!';
                return;
            }
            currentCard = card;
            document.getElementById('cardTitle').innerText = card.title;
            document.getElementById('description').innerHTML = card.description;
            document.getElementById('difficulty').innerText = card.difficulty === 'easy' ? 'ЛЕГКИЙ' : (card.difficulty === 'medium' ? 'СРЕДНИЙ' : 'СЛОЖНЫЙ');
            document.getElementById('difficulty').className = `difficulty ${card.difficulty}`;
            document.getElementById('newsList').innerHTML = card.news.map(n => `<li>${n}</li>`).join('');

            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chart) chart.destroy();
            const points = card.chart_points || [];
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: points.map((_, i) => i + 1), datasets: [{ label: 'Цена (USDT)', data: points.map(p => p.y), borderColor: '#5EEAD4', backgroundColor: 'rgba(94,234,212,0.1)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#5EEAD4' }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#A1A6B0' } }, tooltip: { callbacks: { label: (ctx) => `Цена: $${ctx.raw.toFixed(2)}` } } }, scales: { y: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0', callback: (v) => `$${v.toFixed(0)}` } }, x: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0' } } } }
            });

            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.querySelectorAll('.pred-btn').forEach(btn => { btn.disabled = false; btn.style.opacity = '1'; });
            canAnswer = true;

            document.querySelectorAll('.pred-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (!canAnswer) return;
                    const direction = btn.dataset.dir;
                    canAnswer = false;
                    document.querySelectorAll('.pred-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
                    try {
                        const res = await fetch('/api/cards/submit', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: userId, card_id: currentCard.id, answer: direction })
                        });
                        const data = await res.json();
                        const resultBox = document.getElementById('resultBox');
                        if (data.is_correct) {
                            resultBox.className = 'result-box correct';
                            document.getElementById('resultTitle').innerHTML = '✅ ПРАВИЛЬНО!';
                            document.getElementById('resultText').innerHTML = data.explanation;
                            document.getElementById('xpGain').innerHTML = `+${data.xp_earned} XP`;
                            showNotification(`+${data.xp_earned} XP!`, 'success');
                        } else {
                            resultBox.className = 'result-box wrong';
                            document.getElementById('resultTitle').innerHTML = '❌ НЕПРАВИЛЬНО';
                            const correctText = data.correct_answer === 'up' ? 'ВВЕРХ' : (data.correct_answer === 'down' ? 'ВНИЗ' : 'БОКОВИК');
                            document.getElementById('resultText').innerHTML = `${data.explanation}<br><br>Правильный ответ: ${correctText}`;
                            document.getElementById('xpGain').innerHTML = `+0 XP`;
                            showNotification('Неправильно!', 'error');
                        }
                        resultBox.style.display = 'block';
                        document.getElementById('nextBtn').style.display = 'block';
                        await loadStats();
                    } catch(e) { console.error(e); }
                };
            });
            document.getElementById('nextBtn').onclick = () => loadLearnCard();
        } catch(e) { console.error('Load card error:', e); }
    }

    // Переменные для дуэлей
    let currentDuelMode = 'pvp';
    let selectedBot = null;
    let duelTimer = null;
    let duelCheckInterval = null;
    let currentDuelId = null;
    let myDuelPrediction = null;
    let isBotDuel = false;

    function initDuel() {
        const container = document.getElementById('botsList');
        if (container) {
            container.innerHTML = bots.map(bot => `
                <div class="bot-card" data-bot-id="${bot.id}">
                    <div class="bot-name">🤖 ${bot.name}</div>
                    <div class="bot-rating">⭐ ${bot.rating}</div>
                    <div class="bot-desc">${bot.desc}</div>
                </div>
            `).join('');
            document.querySelectorAll('.bot-card').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.bot-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedBot = parseInt(card.dataset.botId);
                });
            });
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDuelMode = btn.dataset.mode;
                const botDiv = document.getElementById('botSelection');
                if (botDiv) botDiv.classList.toggle('hidden', currentDuelMode !== 'bot');
                document.getElementById('duelStatus').innerHTML = currentDuelMode === 'bot' ? '🤖 Выберите ИИ-бота' : '⚡ Поиск соперника';
            };
        });

        document.getElementById('findBtn').onclick = async () => {
            if (currentDuelMode === 'bot' && !selectedBot) {
                showNotification('Выберите ИИ-бота', 'error');
                return;
            }
            const btn = document.getElementById('findBtn');
            btn.disabled = true;
            btn.textContent = '⏳ ПОИСК...';
            try {
                const body = currentDuelMode === 'bot' ? { user_id: userId, bot_id: selectedBot } : { user_id: userId };
                const res = await fetch('/api/duel/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (data.success) {
                    currentDuelId = data.duel_id;
                    isBotDuel = data.action === 'vs_bot' || currentDuelMode === 'bot';
                    document.getElementById('duelContainer').style.display = 'block';
                    document.getElementById('findBtn').style.display = 'none';
                    document.getElementById('duelStatus').style.display = 'none';
                    startDuel();
                } else {
                    showNotification(data.error || 'Ошибка', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
                }
            } catch(e) { console.error(e); }
        };
    }

    async function startDuel() {
        const stats = await fetch(`/api/user/stats/${userId}`).then(r => r.json());
        document.getElementById('myRating').innerText = stats.duel_rating;
        if (isBotDuel && selectedBot) {
            const bot = bots.find(b => b.id === selectedBot);
            document.getElementById('opponentName').innerHTML = `🤖 ${bot.name}`;
            document.getElementById('opponentRating').innerText = bot.rating;
        } else {
            document.getElementById('opponentName').innerText = 'Соперник';
            document.getElementById('opponentRating').innerText = '500';
        }

        let timeLeft = 30;
        const timerElem = document.getElementById('timer');
        if (duelTimer) clearInterval(duelTimer);
        duelTimer = setInterval(() => {
            timerElem.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(duelTimer);
                resolveDuel();
            }
            timeLeft--;
        }, 1000);

        document.querySelectorAll('.duel-pred').forEach(btn => {
            btn.onclick = async () => {
                if (myDuelPrediction) return;
                const direction = btn.dataset.dir;
                const res = await fetch('/api/duel/submit_prediction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duel_id: currentDuelId, user_id: userId, direction })
                });
                const data = await res.json();
                if (data.success) {
                    myDuelPrediction = direction;
                    document.getElementById('myPredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                    document.getElementById('myPredictionArea').style.display = 'none';
                    document.getElementById('duelMessage').innerHTML = '✅ Прогноз принят';

                    if (isBotDuel && selectedBot) {
                        const botPred = Math.random() > 0.5 ? 'up' : 'down';
                        document.getElementById('opponentPredictionDisplay').innerHTML = `Прогноз бота: ${botPred === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                        setTimeout(() => resolveDuel(), 2000);
                    }
                }
            };
        });

        if (duelCheckInterval) clearInterval(duelCheckInterval);
        duelCheckInterval = setInterval(async () => {
            try {
                const checkRes = await fetch(`/api/duel/check/${currentDuelId}`);
                const checkData = await checkRes.json();
                if (checkData.both_submitted) {
                    clearInterval(duelCheckInterval);
                    resolveDuel();
                }
            } catch(e) {}
        }, 1000);
    }

    async function resolveDuel() {
        clearInterval(duelTimer);
        clearInterval(duelCheckInterval);
        try {
            const res = await fetch('/api/duel/resolve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duel_id: currentDuelId })
            });
            const data = await res.json();
            const isWinner = data.winner_id == userId;
            document.getElementById('duelMessage').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА!<br>Реальное движение: ${data.real_direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}<br>${isWinner ? '🎉 ПОБЕДА!' : '😔 ПОРАЖЕНИЕ'}`;
            showNotification(isWinner ? 'Победа!' : 'Поражение', isWinner ? 'success' : 'error');
            await loadStats();
        } catch(e) { console.error(e); }
        setTimeout(() => {
            document.getElementById('duelContainer').style.display = 'none';
            document.getElementById('findBtn').style.display = 'block';
            document.getElementById('findBtn').disabled = false;
            document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
            document.getElementById('duelStatus').style.display = 'block';
            myDuelPrediction = null;
        }, 3000);
    }

    // Симулятор
    let simBalance = 10000;
    let simPosition = null;
    let simChart = null;
    let simPriceData = [];
    let simStep = 0;
    let simHistory = [];

    function initSimulator() {
        simBalance = 10000;
        simPosition = null;
        simHistory = [];
        simPriceData = [];
        let price = 50000;
        for (let i = 0; i < 100; i++) {
            price = price * (1 + (Math.random() - 0.48) * 0.02);
            simPriceData.push(price);
        }
        simStep = 0;
        updateSimChart();
        document.getElementById('simBalance').innerText = simBalance;
        updateSimHistory();

        document.getElementById('simLong').onclick = () => {
            if (simPosition) { showNotification('Сначала закройте позицию!', 'error'); return; }
            simPosition = { type: 'long', entryPrice: simPriceData[simStep], amount: 1000 };
            document.getElementById('simResult').innerHTML = `<div>✅ Открыта ЛОНГ по $${simPosition.entryPrice.toFixed(2)}</div>`;
            showNotification('ЛОНГ позиция открыта', 'success');
        };
        document.getElementById('simShort').onclick = () => {
            if (simPosition) { showNotification('Сначала закройте позицию!', 'error'); return; }
            simPosition = { type: 'short', entryPrice: simPriceData[simStep], amount: 1000 };
            document.getElementById('simResult').innerHTML = `<div>✅ Открыта ШОРТ по $${simPosition.entryPrice.toFixed(2)}</div>`;
            showNotification('ШОРТ позиция открыта', 'success');
        };
        document.getElementById('simReset').onclick = () => {
            simBalance = 10000;
            simPosition = null;
            simHistory = [];
            simStep = 0;
            document.getElementById('simBalance').innerText = simBalance;
            document.getElementById('simResult').innerHTML = '';
            updateSimHistory();
            updateSimChart();
            showNotification('Симулятор сброшен', 'success');
        };

        setInterval(() => {
            if (simStep < simPriceData.length - 1) {
                simStep++;
                const currentPrice = simPriceData[simStep];
                if (simPosition) {
                    let pnl = 0;
                    if (simPosition.type === 'long') pnl = ((currentPrice - simPosition.entryPrice) / simPosition.entryPrice) * simPosition.amount;
                    else pnl = ((simPosition.entryPrice - currentPrice) / simPosition.entryPrice) * simPosition.amount;
                    document.getElementById('simResult').innerHTML = `<div>Позиция: ${simPosition.type === 'long' ? '📈 ЛОНГ' : '📉 ШОРТ'}<br>Вход: $${simPosition.entryPrice.toFixed(2)}<br>Текущая: $${currentPrice.toFixed(2)}<br>PnL: ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</div>`;
                    if (simStep === simPriceData.length - 1) {
                        simBalance += pnl;
                        simHistory.unshift({ type: simPosition.type, entryPrice: simPosition.entryPrice, exitPrice: currentPrice, pnl: pnl });
                        document.getElementById('simBalance').innerText = simBalance.toFixed(2);
                        document.getElementById('simResult').innerHTML += `<div class="${pnl >= 0 ? 'result-positive' : 'result-negative'}">Позиция закрыта! PnL: ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</div>`;
                        showNotification(pnl >= 0 ? `+$${pnl.toFixed(2)} прибыль!` : `-$${Math.abs(pnl).toFixed(2)} убыток`, pnl >= 0 ? 'success' : 'error');
                        simPosition = null;
                        updateSimHistory();
                    }
                }
                updateSimChart();
            }
        }, 2000);
    }

    function updateSimChart() {
        const ctx = document.getElementById('simChart').getContext('2d');
        if (simChart) simChart.destroy();
        simChart = new Chart(ctx, {
            type: 'line',
            data: { labels: simPriceData.map((_, i) => i + 1), datasets: [{ label: 'Цена BTC', data: simPriceData, borderColor: '#5EEAD4', backgroundColor: 'rgba(94,234,212,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#A1A6B0' } } }, scales: { y: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0', callback: (v) => `$${v.toFixed(0)}` } }, x: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0' } } } }
        });
    }

    function updateSimHistory() {
        const container = document.getElementById('simHistory');
        if (!container) return;
        if (simHistory.length === 0) { container.innerHTML = '<div style="color: #7A8190;">Нет сделок</div>'; return; }
        container.innerHTML = simHistory.map(h => `<div class="history-item"><span>${h.type === 'long' ? '📈 ЛОНГ' : '📉 ШОРТ'}</span><span>Вход: $${h.entryPrice.toFixed(2)}</span><span>Выход: $${h.exitPrice.toFixed(2)}</span><span class="${h.pnl >= 0 ? 'result-positive' : 'result-negative'}">${h.pnl >= 0 ? '+' : ''}$${h.pnl.toFixed(2)}</span></div>`).join('');
    }

    // Кнопка вверх
    const scrollTopBtn = document.getElementById('scrollTopBtn');
    const contentArea = document.querySelector('.content-area');
    if (scrollTopBtn && contentArea) {
        contentArea.addEventListener('scroll', () => {
            if (contentArea.scrollTop > 300) {
                scrollTopBtn.classList.add('show');
            } else {
                scrollTopBtn.classList.remove('show');
            }
        });
        scrollTopBtn.addEventListener('click', () => {
            contentArea.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // Кнопка поддержки
    const supportBtn = document.getElementById('supportBtn');
    if (supportBtn) {
        supportBtn.addEventListener('click', () => {
            showNotification('Чат поддержки: support@tradeum.ru', 'success');
        });
    }

    // Навигация
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            item.classList.add('active');
            loadPage(item.dataset.page);
        });
    });

    // Запуск
    loadStats();
    loadPage('dashboard');
</script>
</body>
</html>
