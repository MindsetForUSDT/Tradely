<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Симулятор</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; padding: 24px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-link { background: #12161E; padding: 10px 22px; border-radius: 40px; text-decoration: none; color: #A1A6B0; border: 1px solid #262B36; transition: all 0.3s; }
        .back-link:hover { border-color: #5EEAD4; color: #FFFFFF; }

        .simulator-card { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; }
        .balance { font-size: 36px; font-weight: 700; color: #5EEAD4; text-align: center; margin-bottom: 24px; }
        .chart-container { background: #0A0C10; border-radius: 16px; padding: 20px; margin-bottom: 24px; }
        canvas { width: 100% !important; height: 300px !important; }
        .trade-panel { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
        .trade-btn { padding: 12px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; border: none; transition: all 0.3s; }
        .trade-btn.long { background: #5EEAD4; color: #0A0C10; }
        .trade-btn.long:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(94, 234, 212, 0.3); }
        .trade-btn.short { background: #F87171; color: #0A0C10; }
        .trade-btn.short:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(248, 113, 113, 0.3); }
        .trade-btn.reset { background: #2E3440; color: #E6E8EC; }
        .result { text-align: center; padding: 16px; background: #0A0C10; border-radius: 16px; margin-bottom: 24px; }
        .result-positive { color: #5EEAD4; }
        .result-negative { color: #F87171; }
        .history { margin-top: 24px; }
        .history-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1F232C; font-size: 14px; flex-wrap: wrap; gap: 10px; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 12px; background: #1A1F2A; border-left: 3px solid; z-index: 1000; animation: slideIn 0.3s ease; }
        .notification.success { border-color: #5EEAD4; }
        .notification.error { border-color: #F87171; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 600px) { body { padding: 16px; } .history-item { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Trade<span>um</span> · Симулятор</div>
        <a href="/dashboard" class="back-link">← Назад</a>
    </div>

    <div class="simulator-card">
        <div class="balance">💰 $<span id="balance">10000</span></div>

        <div class="chart-container">
            <canvas id="simulatorChart"></canvas>
        </div>

        <div class="trade-panel">
            <button class="trade-btn long" id="longBtn">📈 ЛОНГ (Купить)</button>
            <button class="trade-btn short" id="shortBtn">📉 ШОРТ (Продать)</button>
            <button class="trade-btn reset" id="resetBtn">🔄 СБРОС</button>
        </div>

        <div class="result" id="result"></div>

        <div class="history">
            <div class="history-title">📋 История сделок</div>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<script>
    let balance = 10000;
    let position = null;
    let chart = null;
    let priceData = [];
    let currentIndex = 0;
    let history = [];
    let intervalId = null;

    function generatePriceData() {
        const data = [];
        let price = 50000;
        for (let i = 0; i < 100; i++) {
            const change = (Math.random() - 0.48) * 0.02;
            price = price * (1 + change);
            data.push(price);
        }
        return data;
    }

    function initChart() {
        priceData = generatePriceData();
        currentIndex = 0;
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('simulatorChart').getContext('2d');
        if (chart) chart.destroy();

        const displayData = priceData.slice(0, currentIndex + 1);
        const labels = displayData.map((_, i) => i + 1);

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Цена BTC/USDT',
                    data: displayData,
                    borderColor: '#5EEAD4',
                    backgroundColor: 'rgba(94, 234, 212, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { labels: { color: '#A1A6B0' } } },
                scales: {
                    y: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0', callback: (v) => `$${v.toFixed(0)}` } },
                    x: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0' }, title: { display: true, text: 'Время (шаги)', color: '#7A8190' } }
                }
            }
        });
    }

    function updatePrice() {
        if (currentIndex < priceData.length - 1) {
            currentIndex++;
            const currentPrice = priceData[currentIndex];

            if (position) {
                let pnl = 0;
                if (position.type === 'long') {
                    pnl = ((currentPrice - position.entryPrice) / position.entryPrice) * position.amount;
                } else {
                    pnl = ((position.entryPrice - currentPrice) / position.entryPrice) * position.amount;
                }
                document.getElementById('result').innerHTML = `
                    <div>📊 Открыта позиция: ${position.type === 'long' ? '📈 ЛОНГ' : '📉 ШОРТ'}</div>
                    <div>💰 Цена входа: $${position.entryPrice.toFixed(2)}</div>
                    <div>💵 Текущая цена: $${currentPrice.toFixed(2)}</div>
                    <div class="${pnl >= 0 ? 'result-positive' : 'result-negative'}">📈 PnL: ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</div>
                `;

                if (currentIndex === priceData.length - 1) {
                    closePosition(true);
                }
            } else {
                document.getElementById('result').innerHTML = '<div>💤 Нет открытых позиций</div>';
            }

            updateChart();
        } else if (position) {
            closePosition(true);
        }
    }

    function openPosition(type) {
        if (position) {
            document.getElementById('result').innerHTML = '<div class="result-negative">❌ Сначала закройте текущую позицию!</div>';
            return;
        }
        const currentPrice = priceData[currentIndex];
        position = { type: type, entryPrice: currentPrice, amount: 1000 };
        document.getElementById('result').innerHTML = `<div class="result-positive">✅ Открыта ${type === 'long' ? 'ЛОНГ' : 'ШОРТ'} позиция по $${currentPrice.toFixed(2)}</div>`;
        showNotification(`Позиция ${type === 'long' ? 'ЛОНГ' : 'ШОРТ'} открыта!`, 'success');
    }

    function closePosition(isAuto = false) {
        if (!position) {
            document.getElementById('result').innerHTML = '<div class="result-negative">❌ Нет открытых позиций!</div>';
            return;
        }
        const currentPrice = priceData[currentIndex];
        let pnl = 0;
        if (position.type === 'long') {
            pnl = ((currentPrice - position.entryPrice) / position.entryPrice) * position.amount;
        } else {
            pnl = ((position.entryPrice - currentPrice) / position.entryPrice) * position.amount;
        }

        balance += pnl;

        history.unshift({
            id: Date.now(),
            type: position.type,
            entryPrice: position.entryPrice,
            exitPrice: currentPrice,
            pnl: pnl,
            time: new Date().toLocaleTimeString()
        });

        document.getElementById('balance').innerText = balance.toFixed(2);
        document.getElementById('result').innerHTML = `
            <div>🔒 Позиция закрыта</div>
            <div class="${pnl >= 0 ? 'result-positive' : 'result-negative'}">📊 Результат: ${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</div>
            <div>💰 Новый баланс: $${balance.toFixed(2)}</div>
        `;

        updateHistoryDisplay();
        position = null;

        if (!isAuto) {
            showNotification(pnl >= 0 ? `+$${pnl.toFixed(2)} прибыль!` : `-$${Math.abs(pnl).toFixed(2)} убыток`, pnl >= 0 ? 'success' : 'error');
        }
    }

    function updateHistoryDisplay() {
        const container = document.getElementById('historyList');
        if (history.length === 0) {
            container.innerHTML = '<div style="color: #7A8190; text-align: center; padding: 20px;">✨ Нет сделок. Начните торговать!</div>';
            return;
        }
        container.innerHTML = history.map(h => `
            <div class="history-item">
                <span>⏰ ${h.time}</span>
                <span>${h.type === 'long' ? '📈 ЛОНГ' : '📉 ШОРТ'}</span>
                <span>💰 Вход: $${h.entryPrice.toFixed(2)}</span>
                <span>💵 Выход: $${h.exitPrice.toFixed(2)}</span>
                <span class="${h.pnl >= 0 ? 'result-positive' : 'result-negative'}">${h.pnl >= 0 ? '+' : ''}$${h.pnl.toFixed(2)}</span>
            </div>
        `).join('');
    }

    function resetSimulator() {
        if (intervalId) clearInterval(intervalId);
        balance = 10000;
        position = null;
        history = [];
        currentIndex = 0;
        document.getElementById('balance').innerText = balance;
        document.getElementById('result').innerHTML = '<div>🔄 Симулятор сброшен</div>';
        updateHistoryDisplay();
        initChart();
        showNotification('Симулятор сброшен', 'success');
        startPriceUpdates();
    }

    function startPriceUpdates() {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(() => {
            updatePrice();
        }, 2000);
    }

    function showNotification(msg, type) {
        const div = document.createElement('div');
        div.className = `notification ${type}`;
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    document.getElementById('longBtn').onclick = () => openPosition('long');
    document.getElementById('shortBtn').onclick = () => openPosition('short');
    document.getElementById('resetBtn').onclick = resetSimulator;

    initChart();
    updateHistoryDisplay();
    startPriceUpdates();
</script>
</body>
</html>
