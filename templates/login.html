<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Tradeum</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Tradeum</h1>
                <p>Твой путь к финансовой свободе начинается здесь</p>
            </div>

            {% if registered %}
            <div class="alert alert-success">✅ Регистрация успешна! Добро пожаловать в Tradeum. Войди и начни свой путь.</div>
            {% endif %}

            {% if error %}
            <div class="alert alert-error">❌ Неверное имя пользователя или пароль. Попробуй ещё раз.</div>
            {% endif %}

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>

            <div id="login-tab" class="tab-content active">
                <form action="/login" method="post">
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" name="username" placeholder="Твой никнейм" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Войти в Tradeum</button>
                </form>
            </div>

            <div id="register-tab" class="tab-content">
                <form action="/register" method="post">
                    <div class="form-group">
                        <label>Имя пользователя</label>
                        <input type="text" name="username" placeholder="Придумай никнейм" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" name="password" placeholder="Придумай пароль" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Создать аккаунт</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
            });
        });
    </script>
</body>
</html>
