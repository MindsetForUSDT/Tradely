<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Tradeum</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0E17 0%, #0F1320 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #121624;
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #2A3042;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: white;
        }
        h1 span {
            color: #00D09C;
        }
        .subtitle {
            color: #A0A8C0;
            margin-bottom: 32px;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid #2A3042;
        }
        .tab {
            padding: 12px 0;
            cursor: pointer;
            color: #A0A8C0;
            font-weight: 600;
        }
        .tab.active {
            color: #00D09C;
            border-bottom: 2px solid #00D09C;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #E8EDF2;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1A1F2E;
            border: 1px solid #2A3042;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #00D09C;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #00D09C;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            color: #0A0E17;
            cursor: pointer;
            margin-top: 8px;
        }
        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .alert-success {
            background: rgba(0, 208, 156, 0.1);
            border: 1px solid #00D09C;
            color: #00D09C;
        }
        .alert-error {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid #FF4D6D;
            color: #FF4D6D;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Trade<span>um</span></h1>
        <div class="subtitle">Войди или создай аккаунт</div>

        {% if registered %}
        <div class="alert alert-success">✅ Регистрация успешна! Войдите.</div>
        {% endif %}
        {% if error == '1' %}
        <div class="alert alert-error">❌ Неверное имя или пароль</div>
        {% endif %}
        {% if error == 'exists' %}
        <div class="alert alert-error">❌ Пользователь уже существует</div>
        {% endif %}

        <div class="tabs">
            <div class="tab active" data-tab="login">Вход</div>
            <div class="tab" data-tab="register">Регистрация</div>
        </div>

        <div id="login-form">
            <form action="/login" method="post">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Войти</button>
            </form>
        </div>

        <div id="register-form" class="hidden">
            <form action="/register" method="post">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                if (tabName === 'login') {
                    document.getElementById('login-form').classList.remove('hidden');
                    document.getElementById('register-form').classList.add('hidden');
                } else {
                    document.getElementById('login-form').classList.add('hidden');
                    document.getElementById('register-form').classList.remove('hidden');
                }
            });
        });
    </script>
</body>
</html>
