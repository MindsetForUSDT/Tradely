<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Рейтинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; padding: 24px; }
        .container { max-width: 900px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1F232C; margin-bottom: 30px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-link { background: #12161E; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: #A1A6B0; border: 1px solid #262B36; transition: all 0.3s; }
        .back-link:hover { border-color: #5EEAD4; color: #FFFFFF; }

        .leaderboard { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; overflow: hidden; }
        .row { display: grid; grid-template-columns: 80px 1fr 100px 100px; padding: 16px 24px; border-bottom: 1px solid #1F232C; align-items: center; }
        .header-row { background: #0A0C10; color: #7A8190; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .rank { font-weight: 700; color: #F4B740; }
        .username { font-weight: 500; }
        .rating { font-weight: 700; color: #5EEAD4; }
        .empty { text-align: center; padding: 48px; color: #7A8190; }

        @media (max-width: 600px) { .row { grid-template-columns: 60px 1fr 80px 80px; font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Trade<span>um</span> · Рейтинг</div>
        <a href="/learn" class="back-link">← Назад</a>
    </div>

    <div class="leaderboard">
        <div class="row header-row"><div>Место</div><div>Трейдер</div><div>Уровень</div><div>Опыт</div></div>
        <div id="leaderboardList"></div>
    </div>
</div>

<script>
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const leaders = await res.json();
            const container = document.getElementById('leaderboardList');
            if (!leaders.length) {
                container.innerHTML = '<div class="empty">Пока нет данных</div>';
                return;
            }
            container.innerHTML = leaders.map((l, idx) => `
                <div class="row">
                    <div class="rank">#${idx + 1}</div>
                    <div class="username">${l.username}</div>
                    <div class="rating">${l.level}</div>
                    <div class="rating">${l.experience_points}</div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }
    loadLeaderboard();
    setInterval(loadLeaderboard, 15000);
</script>
</body>
</html>
