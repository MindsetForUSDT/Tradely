<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Рейтинг</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0E14;
            color: #E6E8EC;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1F232C;
        }
        .logo { font-size: 26px; font-weight: 600; color: #FFFFFF; }
        .logo span { color: #5EEAD4; font-weight: 500; }
        .back-link {
            color: #A1A6B0;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            background: #141820;
            border: 1px solid #262B36;
        }
        .back-link:hover { color: #FFFFFF; border-color: #5EEAD4; }

        .board {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 24px;
            overflow: hidden;
        }
        .row {
            display: grid;
            grid-template-columns: 80px 1fr 120px 100px;
            padding: 16px 24px;
            border-bottom: 1px solid #1F232C;
            align-items: center;
        }
        .header-row {
            background: #141820;
            color: #7A8190;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .row:last-child { border-bottom: none; }
        .rank { font-weight: 700; color: #F4B740; }
        .username { font-weight: 500; color: #FFFFFF; }
        .rating { font-weight: 700; color: #5EEAD4; }
        .stats { color: #A1A6B0; font-size: 14px; }
        .empty { padding: 48px; text-align: center; color: #7A8190; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Trade<span>um</span> <span style="font-size: 16px; margin-left: 12px; color: #7A8190;">Рейтинг трейдеров</span></div>
        <a href="javascript:history.back()" class="back-link">← Назад</a>
    </div>
    <div class="board">
        <div class="row header-row"><div>Место</div><div>Трейдер</div><div>Рейтинг</div><div>W / L</div></div>
        <div id="leaderboardList"></div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    let userId = urlParams.get('user_id');
    if (userId) localStorage.setItem('tradeum_user_id', userId);

    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/duel/leaderboard');
            const leaders = await res.json();
            const container = document.getElementById('leaderboardList');
            if (!leaders.length) {
                container.innerHTML = '<div class="empty">Пока нет данных</div>';
                return;
            }
            container.innerHTML = leaders.map((l, idx) => `
                <div class="row">
                    <div class="rank">#${idx + 1}</div>
                    <div class="username">${l.username}</div>
                    <div class="rating">${l.rating}</div>
                    <div class="stats">${l.wins} / ${l.losses}</div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }
    loadLeaderboard();
    setInterval(loadLeaderboard, 15000);
</script>
</body>
</html>
