<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; padding: 24px; }
        .container { max-width: 800px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1F232C; margin-bottom: 30px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-link { background: #12161E; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: #A1A6B0; border: 1px solid #262B36; transition: all 0.3s; }
        .back-link:hover { border-color: #5EEAD4; color: #FFFFFF; }

        .profile-card { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; text-align: center; margin-bottom: 30px; }
        .username { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
        .level-badge { display: inline-block; background: rgba(94, 234, 212, 0.1); padding: 6px 16px; border-radius: 20px; color: #5EEAD4; font-weight: 600; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #0A0C10; border-radius: 16px; padding: 20px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 700; color: #5EEAD4; }
        .stat-label { font-size: 12px; color: #7A8190; margin-top: 8px; }

        .progress-section { margin-bottom: 30px; }
        .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .progress-bar { background: #1F232C; border-radius: 10px; height: 10px; overflow: hidden; }
        .progress-fill { background: #5EEAD4; height: 100%; border-radius: 10px; transition: width 0.3s; }

        .achievements { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 24px; }
        .achievements-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
        .achievements-list { display: flex; flex-wrap: wrap; gap: 12px; }
        .achievement { background: #0A0C10; padding: 10px 16px; border-radius: 40px; font-size: 13px; color: #F4B740; border: 1px solid rgba(244, 183, 64, 0.2); }

        @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Trade<span>um</span> · Профиль</div>
        <a href="/learn" class="back-link">← Назад</a>
    </div>

    <div class="profile-card">
        <div class="username" id="username">—</div>
        <div class="level-badge" id="level">Уровень 1</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="xp">0</div><div class="stat-label">Опыт (XP)</div></div>
        <div class="stat-card"><div class="stat-value" id="streak">0</div><div class="stat-label">🔥 Текущая серия</div></div>
        <div class="stat-card"><div class="stat-value" id="bestStreak">0</div><div class="stat-label">🏆 Лучшая серия</div></div>
        <div class="stat-card"><div class="stat-value" id="accuracy">0%</div><div class="stat-label">Точность</div></div>
    </div>

    <div class="progress-section">
        <div class="progress-label"><span>Прогресс до следующего уровня</span><span id="xpProgressText">0 / 0</span></div>
        <div class="progress-bar"><div class="progress-fill" id="xpProgressFill" style="width: 0%"></div></div>
    </div>

    <div class="achievements">
        <div class="achievements-title">🏆 Достижения</div>
        <div class="achievements-list" id="achievementsList"></div>
    </div>
</div>

<script>
    const userId = {{ user_id }};

    async function loadProfile() {
        try {
            const res = await fetch(`/api/user/stats/${userId}`);
            const stats = await res.json();

            document.getElementById('username').innerText = stats.username;
            document.getElementById('level').innerText = `Уровень ${stats.level}`;
            document.getElementById('xp').innerText = stats.experience;
            document.getElementById('streak').innerText = stats.current_streak;
            document.getElementById('bestStreak').innerText = stats.best_streak;
            document.getElementById('accuracy').innerText = `${Math.round(stats.accuracy)}%`;

            const xpForNext = stats.xp_for_next;
            const currentXp = stats.experience;
            const prevLevelXp = xpForNext - 100;
            const progress = ((currentXp - prevLevelXp) / 100) * 100;
            document.getElementById('xpProgressFill').style.width = `${stats.progress_percent}%`;
            document.getElementById('xpProgressText').innerText = `${currentXp - prevLevelXp} / 100`;

            const achievementsMap = {
                'streak_3': '🔥 Серия 3 побед',
                'streak_5': '⚡ Серия 5 побед',
                'correct_10': '📚 10 правильных ответов',
                'level_5': '🎯 Уровень 5'
            };

            const achievementsList = document.getElementById('achievementsList');
            if (stats.achievements.length === 0) {
                achievementsList.innerHTML = '<div style="color: #7A8190;">Пока нет достижений. Проходите карточки!</div>';
            } else {
                achievementsList.innerHTML = stats.achievements.map(a => `<div class="achievement">${achievementsMap[a] || a}</div>`).join('');
            }
        } catch(e) {
            console.error(e);
        }
    }

    loadProfile();
</script>
</body>
</html>
