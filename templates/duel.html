<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum — Дуэль трейдеров</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0A0E17; color: #E8EDF2; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #2A3042; margin-bottom: 20px; }
        .logo { font-size: 28px; font-weight: 800; }
        .logo span { color: #00D09C; }
        .back-btn { background: #2A3042; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; }
        .duel-container { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .player-card { flex: 1; background: #121624; border-radius: 16px; padding: 20px; border: 1px solid #2A3042; min-width: 280px; }
        .player-card h3 { margin-bottom: 15px; }
        .prediction-buttons { display: flex; gap: 15px; margin: 20px 0; }
        .prediction-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 18px; cursor: pointer; background: #1A1F2E; color: #E8EDF2; transition: all 0.2s; }
        .prediction-btn.up:hover { background: #00D09C; color: #0A0E17; }
        .prediction-btn.down:hover { background: #FF4D6D; color: #0A0E17; }
        .prediction-btn.selected.up { background: #00D09C; color: #0A0E17; }
        .prediction-btn.selected.down { background: #FF4D6D; color: #0A0E17; }
        .timer { text-align: center; font-size: 48px; font-weight: 800; margin: 30px 0; font-family: monospace; }
        .status { text-align: center; padding: 20px; background: #121624; border-radius: 12px; margin: 20px 0; }
        .find-btn { background: #00D09C; color: #0A0E17; border: none; padding: 15px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; display: block; margin: 20px auto; }
        .find-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .chart-container { background: #121624; border-radius: 16px; padding: 0; margin: 20px 0; border: 1px solid #2A3042; overflow: hidden; height: 450px; }
        .leaderboard { margin-top: 40px; background: #121624; border-radius: 16px; overflow: hidden; border: 1px solid #2A3042; }
        .leaderboard h3 { padding: 20px; border-bottom: 1px solid #2A3042; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #2A3042; }
        .rank { font-weight: 700; color: #FFD700; width: 50px; }
        .username { flex: 1; }
        .rating { font-weight: 700; color: #00D09C; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; background: #1A1F2E; border-left: 3px solid; z-index: 1000; animation: slideIn 0.3s ease; }
        .notification.success { border-color: #00D09C; }
        .notification.error { border-color: #FF4D6D; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 700px) { .duel-container { flex-direction: column; } }
    </style>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Trade<span>um</span> | Дуэль</div>
            <a href="/dashboard" class="back-btn">← Назад</a>
        </div>

        <div id="duelStatus" class="status">⚔️ Нажмите «Найти соперника», чтобы начать дуэль</div>

        <div class="duel-container" id="duelContainer" style="display: none;">
            <div class="player-card">
                <h3>👤 <span id="p1Name">—</span></h3>
                <div>⭐ Рейтинг: <span id="p1Rating">—</span></div>
                <div id="p1PredictionArea">
                    <div class="prediction-buttons">
                        <button class="prediction-btn up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="prediction-btn down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div id="p1PredictionDisplay" style="margin-top: 15px;"></div>
            </div>
            <div class="player-card">
                <h3>👤 <span id="p2Name">—</span></h3>
                <div>⭐ Рейтинг: <span id="p2Rating">—</span></div>
                <div id="p2PredictionArea">
                    <div class="prediction-buttons">
                        <button class="prediction-btn up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="prediction-btn down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div id="p2PredictionDisplay" style="margin-top: 15px;"></div>
            </div>
        </div>

        <div class="timer" id="timer">—</div>
        <div class="chart-container" id="chartContainer">
            <div style="text-align: center; padding: 200px;">Загрузка графика...</div>
        </div>

        <button class="find-btn" id="findBtn">🔍 НАЙТИ СОПЕРНИКА</button>

        <div class="leaderboard">
            <h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <script>
        // Получаем user_id из URL параметра или из глобальной переменной
        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('user_id');

        // Если user_id нет в URL, пробуем получить из localStorage
        if (!userId) {
            userId = localStorage.getItem('tradeum_user_id');
        }

        console.log('Duel page - User ID:', userId);

        if (!userId) {
            document.getElementById('duelStatus').innerHTML = '❌ Ошибка: не найден ID пользователя. <a href="/dashboard">Вернуться в дашборд</a>';
            document.getElementById('findBtn').disabled = true;
        }

        let currentDuelId = null;
        let myPrediction = null;
        let timerInterval = null;
        let checkInterval = null;
        let tvWidget = null;

        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/duel/leaderboard');
                const leaders = await res.json();
                const container = document.getElementById('leaderboardList');
                if (!leaders.length) {
                    container.innerHTML = '<div class="leaderboard-row">Нет данных</div>';
                    return;
                }
                container.innerHTML = leaders.map((l, idx) => `
                    <div class="leaderboard-row">
                        <div class="rank">#${idx + 1}</div>
                        <div class="username">${l.username}</div>
                        <div class="rating">⭐ ${l.rating}</div>
                        <div>🎯 ${l.wins}W/${l.losses}L</div>
                    </div>
                `).join('');
            } catch(e) {
                console.error('Leaderboard error:', e);
            }
        }

        function initTradingView() {
            const container = document.getElementById('chartContainer');
            container.innerHTML = '<div id="tv-chart" style="height: 450px;"></div>';
            try {
                tvWidget = new TradingView.widget({
                    width: "100%",
                    height: 450,
                    symbol: "BINANCE:BTCUSDT",
                    interval: "1",
                    timezone: "Etc/UTC",
                    theme: "dark",
                    style: "1",
                    locale: "ru",
                    toolbar_bg: "#0A0E17",
                    enable_publishing: false,
                    allow_symbol_change: false,
                    studies: ["MASimple@tv-basicstudies,RSI@tv-basicstudies"],
                    container_id: "tv-chart"
                });
            } catch(e) {
                console.error('TradingView error:', e);
                container.innerHTML = '<div style="text-align: center; padding: 200px;">⚠️ График временно недоступен</div>';
            }
        }

        async function findOpponent() {
            if (!userId) {
                showNotification('Ошибка: пользователь не авторизован', 'error');
                return;
            }

            const btn = document.getElementById('findBtn');
            btn.disabled = true;
            btn.textContent = '⏳ ПОИСК...';

            try {
                const res = await fetch('/api/duel/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: parseInt(userId) })
                });
                const data = await res.json();

                if (data.success) {
                    currentDuelId = data.duel_id;
                    showNotification(data.action === 'created' ? '✅ Ожидаем соперника...' : '✅ Соперник найден! Дуэль начинается!', 'success');

                    if (data.action === 'joined') {
                        startDuel(currentDuelId);
                    } else {
                        waitForOpponent(currentDuelId);
                    }
                } else {
                    showNotification(data.error || 'Ошибка поиска', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
                }
            } catch(e) {
                console.error('Find opponent error:', e);
                showNotification('Ошибка сервера', 'error');
                btn.disabled = false;
                btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
            }
        }

        async function waitForOpponent(duelId) {
            const checkOpponent = setInterval(async () => {
                try {
                    const res = await fetch(`/api/duel/status/${duelId}`);
                    const data = await res.json();
                    if (data.status === 'active') {
                        clearInterval(checkOpponent);
                        startDuel(duelId);
                    }
                } catch(e) {
                    console.error('Wait for opponent error:', e);
                }
            }, 2000);

            setTimeout(() => {
                clearInterval(checkOpponent);
                if (document.getElementById('duelContainer').style.display === 'none') {
                    showNotification('Поиск отменён. Попробуйте снова.', 'error');
                    document.getElementById('findBtn').disabled = false;
                    document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
                }
            }, 60000);
        }

        async function startDuel(duelId) {
            document.getElementById('duelContainer').style.display = 'flex';
            document.getElementById('findBtn').style.display = 'none';
            document.getElementById('duelStatus').innerHTML = '⚔️ ДУЭЛЬ НАЧАЛАСЬ! Сделайте свой прогноз';

            try {
                const res = await fetch(`/api/duel/status/${duelId}`);
                const data = await res.json();

                const p1Rating = await fetch(`/api/duel/rating/${data.player1_id}`).then(r => r.json());
                const p2Rating = data.player2_id ? await fetch(`/api/duel/rating/${data.player2_id}`).then(r => r.json()) : { rating: '—' };

                document.getElementById('p1Name').innerText = data.player1_id == userId ? 'Вы' : `Player ${data.player1_id}`;
                document.getElementById('p1Rating').innerText = p1Rating.rating;
                document.getElementById('p2Name').innerText = data.player2_id ? (data.player2_id == userId ? 'Вы' : `Player ${data.player2_id}`) : 'Ожидание...';
                document.getElementById('p2Rating').innerText = data.player2_id ? p2Rating.rating : '—';
            } catch(e) {
                console.error('Start duel error:', e);
            }

            // Таймер 3-5 минут
            let timeLeft = 180 + Math.floor(Math.random() * 120);
            const timerElem = document.getElementById('timer');

            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElem.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    resolveDuel(duelId);
                }
                timeLeft--;
            }, 1000);

            setupPredictionButtons(duelId);

            checkInterval = setInterval(async () => {
                try {
                    const checkRes = await fetch(`/api/duel/check_predictions/${duelId}`);
                    const checkData = await checkRes.json();
                    if (checkData.both_submitted) {
                        clearInterval(checkInterval);
                        showNotification('Оба игрока сделали прогноз! Ожидаем результат...', 'success');
                        setTimeout(() => resolveDuel(duelId), 3000);
                    }
                } catch(e) {
                    console.error('Check predictions error:', e);
                }
            }, 1000);
        }

        function setupPredictionButtons(duelId) {
            const buttons = document.querySelectorAll('.prediction-btn');
            buttons.forEach(btn => {
                btn.onclick = async () => {
                    if (myPrediction) {
                        showNotification('Вы уже сделали прогноз!', 'error');
                        return;
                    }

                    const direction = btn.dataset.dir;

                    try {
                        const res = await fetch('/api/duel/submit_prediction', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ duel_id: duelId, user_id: parseInt(userId), direction: direction })
                        });
                        const data = await res.json();

                        if (data.success) {
                            myPrediction = direction;
                            btn.classList.add('selected');
                            showNotification(`✅ Прогноз: ${direction === 'up' ? 'ВВЕРХ' : 'ВНИЗ'}`, 'success');
                            document.getElementById('p1PredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                            document.getElementById('p1PredictionArea').style.display = 'none';
                        } else {
                            showNotification(data.error || 'Ошибка', 'error');
                        }
                    } catch(e) {
                        console.error('Submit prediction error:', e);
                        showNotification('Ошибка отправки прогноза', 'error');
                    }
                };
            });
        }

        async function resolveDuel(duelId) {
            clearInterval(timerInterval);
            clearInterval(checkInterval);

            try {
                const res = await fetch('/api/duel/resolve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duel_id: duelId })
                });
                const data = await res.json();

                if (data.success) {
                    const resultText = data.winner_id == userId ? '🎉 ПОБЕДА!' : (data.winner_id ? '😔 ПОРАЖЕНИЕ' : '🤝 НИЧЬЯ');
                    const changeText = data.winner_id == userId ? `+${data.player1_change}` : (data.winner_id ? `${data.player1_change}` : '0');

                    showNotification(`${resultText} Изменение рейтинга: ${changeText}`, data.winner_id == userId ? 'success' : 'error');
                    document.getElementById('duelStatus').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА! Реальное движение: ${data.price_change_pct > 0 ? '📈 ВВЕРХ' : '📉 ВНИЗ'} (${data.price_change_pct}%)<br>${resultText}`;

                    await loadLeaderboard();
                }
            } catch(e) {
                console.error('Resolve duel error:', e);
                showNotification('Ошибка завершения дуэли', 'error');
            }

            setTimeout(() => {
                resetDuel();
            }, 5000);
        }

        function resetDuel() {
            currentDuelId = null;
            myPrediction = null;
            document.getElementById('duelContainer').style.display = 'none';
            document.getElementById('findBtn').style.display = 'block';
            document.getElementById('findBtn').disabled = false;
            document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
            document.getElementById('timer').textContent = '—';
            document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника», чтобы начать дуэль';
            document.getElementById('p1PredictionArea').style.display = 'block';
            document.querySelectorAll('.prediction-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('p1PredictionDisplay').innerHTML = '';
            document.getElementById('p2PredictionDisplay').innerHTML = '';
        }

        document.getElementById('findBtn').onclick = findOpponent;

        initTradingView();
        loadLeaderboard();
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
