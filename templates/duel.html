<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tradeum — Дуэль трейдеров</title>
    <!-- Lightweight Charts (библиотека от TradingView) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0E17;
            color: #E8EDF2;
            padding: 16px;
        }
        .container { max-width: 1600px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid #2A3042; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: #00D09C; }
        .back-btn { background: #2A3042; color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; }

        .status { text-align: center; padding: 16px; background: #121624; border-radius: 12px; margin: 16px 0; font-size: 16px; }
        .find-btn { background: #00D09C; color: #0A0E17; border: none; padding: 12px 32px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; display: block; margin: 16px auto; }
        .find-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .duel-container { display: flex; gap: 16px; flex-wrap: wrap; margin: 20px 0; }
        .player-card { flex: 1; background: #121624; border-radius: 14px; padding: 16px; border: 1px solid #2A3042; min-width: 240px; text-align: center; }
        .player-card h3 { margin-bottom: 12px; font-size: 18px; }
        .rating-badge { font-size: 20px; font-weight: 700; color: #FFD700; margin: 8px 0; }
        .prediction-buttons { display: flex; gap: 12px; margin: 16px 0; justify-content: center; }
        .prediction-btn { padding: 10px 24px; border: none; border-radius: 10px; font-weight: 700; font-size: 16px; cursor: pointer; background: #1A1F2E; color: #E8EDF2; transition: all 0.2s; }
        .prediction-btn.up:hover { background: #00D09C33; }
        .prediction-btn.down:hover { background: #FF4D6D33; }
        .prediction-btn.up.selected { background: #00D09C; color: #0A0E17; }
        .prediction-btn.down.selected { background: #FF4D6D; color: #0A0E17; }
        .prediction-display { margin-top: 12px; font-size: 13px; color: #A0A8C0; }

        .timer { text-align: center; font-size: 44px; font-weight: 800; margin: 16px 0; font-family: monospace; }

        /* TradingView стиль графика */
        .chart-wrapper {
            background: #121624;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            border: 1px solid #2A3042;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chart-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chart-btn {
            background: #1A1F2E;
            border: 1px solid #2A3042;
            padding: 6px 14px;
            border-radius: 6px;
            color: #E8EDF2;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chart-btn:hover, .chart-btn.active {
            background: #00D09C;
            color: #0A0E17;
            border-color: #00D09C;
        }
        .indicator-select {
            background: #1A1F2E;
            border: 1px solid #2A3042;
            padding: 6px 12px;
            border-radius: 6px;
            color: #E8EDF2;
            font-size: 12px;
            cursor: pointer;
        }
        #chart-container {
            width: 100%;
            height: 500px;
            position: relative;
        }

        .tools-hint {
            text-align: center;
            font-size: 11px;
            color: #A0A8C0;
            margin-top: 8px;
            padding: 8px;
            background: #1A1F2E;
            border-radius: 6px;
        }

        .leaderboard { margin-top: 30px; background: #121624; border-radius: 14px; overflow: hidden; border: 1px solid #2A3042; }
        .leaderboard h3 { padding: 14px 18px; border-bottom: 1px solid #2A3042; font-size: 16px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid #2A3042; font-size: 14px; }
        .rank { font-weight: 700; color: #FFD700; width: 45px; }
        .username { flex: 1; }
        .rating { font-weight: 700; color: #00D09C; }

        .notification { position: fixed; top: 20px; right: 20px; padding: 10px 18px; border-radius: 8px; background: #1A1F2E; border-left: 3px solid; z-index: 1000; animation: slideIn 0.3s ease; font-size: 14px; }
        .notification.success { border-color: #00D09C; }
        .notification.error { border-color: #FF4D6D; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .duel-container { flex-direction: column; }
            .prediction-btn { padding: 8px 18px; font-size: 14px; }
            .timer { font-size: 32px; }
            #chart-container { height: 350px; }
            .chart-btn { padding: 4px 10px; font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Trade<span>um</span> | Дуэль</div>
            <a href="/dashboard" class="back-btn">← Назад</a>
        </div>

        <div id="duelStatus" class="status">⚔️ Нажмите «Найти соперника», чтобы начать дуэль</div>

        <div class="duel-container" id="duelContainer" style="display: none;">
            <div class="player-card">
                <h3>👤 <span id="p1Name">—</span></h3>
                <div class="rating-badge" id="p1Rating">—</div>
                <div id="p1PredictionArea">
                    <div class="prediction-buttons">
                        <button class="prediction-btn up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="prediction-btn down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div class="prediction-display" id="p1PredictionDisplay"></div>
            </div>
            <div class="player-card">
                <h3>👤 <span id="p2Name">—</span></h3>
                <div class="rating-badge" id="p2Rating">—</div>
                <div id="p2PredictionArea">
                    <div class="prediction-buttons">
                        <button class="prediction-btn up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="prediction-btn down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div class="prediction-display" id="p2PredictionDisplay"></div>
            </div>
        </div>

        <div class="timer" id="timer">—</div>

        <div class="chart-wrapper">
            <div class="chart-header">
                <div class="chart-controls">
                    <button class="chart-btn active" data-type="candle">📊 Свечи</button>
                    <button class="chart-btn" data-type="line">📈 Линии</button>
                    <button class="chart-btn" data-type="area">🎯 Область</button>
                    <button class="chart-btn" id="reset-zoom-btn">🔍 Сброс зума</button>
                </div>
                <div class="chart-controls">
                    <select id="indicator-select" class="indicator-select">
                        <option value="">📉 Индикаторы</option>
                        <option value="sma7">MA (7)</option>
                        <option value="sma25">MA (25)</option>
                        <option value="ema12">EMA (12)</option>
                        <option value="rsi">RSI (14)</option>
                        <option value="volume">Объём</option>
                    </select>
                </div>
            </div>
            <div id="chart-container"></div>
            <div class="tools-hint">
                🖱️ Зум: колёсико мыши | Панорамирование: зажать Shift + мышь | Перемещение графика: клик и перетаскивание
            </div>
        </div>

        <button class="find-btn" id="findBtn">🔍 НАЙТИ СОПЕРНИКА</button>

        <div class="leaderboard">
            <h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <script>
        // Получаем user_id из URL
        const urlParams = new URLSearchParams(window.location.search);
        let userId = urlParams.get('user_id');

        if (!userId) {
            userId = localStorage.getItem('tradeum_user_id');
        }

        if (userId) {
            localStorage.setItem('tradeum_user_id', userId);
        }

        if (!userId) {
            document.getElementById('duelStatus').innerHTML = '❌ Ошибка: не найден ID пользователя. <a href="/dashboard">Вернуться в дашборд</a>';
            document.getElementById('findBtn').disabled = true;
        }

        let currentDuelId = null;
        let myPrediction = null;
        let timerInterval = null;
        let checkInterval = null;
        let statusCheckInterval = null;

        // Глобальные переменные для графика
        let chart = null;
        let candleSeries = null;
        let lineSeries = null;
        let areaSeries = null;
        let currentChartType = 'candle';
        let indicators = {};
        let historicalData = null;
        let fullData = null;

        // Генерация реалистичных данных с трендом
        function generateRealisticData(bars = 120, startPrice = 50000, trend = 0) {
            const data = [];
            let price = startPrice;
            let trendDirection = trend;
            let trendStrength = 0;
            const now = new Date();

            for (let i = 0; i <= bars; i++) {
                // Смена тренда каждые 20-30 свечей
                if (i % 25 === 0) {
                    trendDirection = (Math.random() - 0.5) * 0.03;
                    trendStrength = Math.random() * 0.01;
                }

                // Основное движение
                const trendMove = trendDirection * 0.01;
                const randomMove = (Math.random() - 0.5) * 0.02;
                const volatility = Math.random() * 0.015;
                const change = trendMove + randomMove + (Math.random() - 0.5) * volatility;

                price = price * (1 + change);

                // Создаём свечу
                const open = price;
                const close = price * (1 + (Math.random() - 0.5) * 0.01);
                const high = Math.max(open, close) * (1 + Math.random() * 0.008);
                const low = Math.min(open, close) * (1 - Math.random() * 0.008);

                const time = new Date(now.getTime() - (bars - i) * 3600000);

                data.push({
                    time: time.toISOString().slice(0, 19),
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                    volume: Math.floor(Math.random() * 1000) + 500
                });
            }
            return data;
        }

        // Инициализация графика
        function initChart() {
            const container = document.getElementById('chart-container');
            container.innerHTML = '';

            chart = LightweightCharts.createChart(container, {
                layout: {
                    background: { color: '#0F1320' },
                    textColor: '#E8EDF2',
                },
                grid: {
                    vertLines: { color: '#1E2436' },
                    horzLines: { color: '#1E2436' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#2A3042',
                },
                timeScale: {
                    borderColor: '#2A3042',
                    timeVisible: true,
                    secondsVisible: false,
                },
                width: container.clientWidth,
                height: 500,
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00D09C',
                downColor: '#FF4D6D',
                borderVisible: false,
                wickUpColor: '#00D09C',
                wickDownColor: '#FF4D6D',
            });

            lineSeries = chart.addLineSeries({
                color: '#2962FF',
                lineWidth: 2,
                visible: false,
            });

            areaSeries = chart.addAreaSeries({
                topColor: '#2962FF33',
                bottomColor: '#2962FF00',
                lineColor: '#2962FF',
                lineWidth: 2,
                visible: false,
            });

            chart.timeScale().fitContent();

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: container.clientWidth });
            });
        }

        // Загрузка данных на график
        function loadChartData(data, type = 'candle') {
            if (!candleSeries) return;

            const candleData = data.map(d => ({
                time: d.time,
                open: d.open,
                high: d.high,
                low: d.low,
                close: d.close,
            }));

            const lineData = data.map(d => ({
                time: d.time,
                value: d.close,
            }));

            candleSeries.setData(candleData);
            lineSeries.setData(lineData);
            areaSeries.setData(lineData);

            // Показываем нужный тип
            candleSeries.applyOptions({ visible: type === 'candle' });
            lineSeries.applyOptions({ visible: type === 'line' });
            areaSeries.applyOptions({ visible: type === 'area' });

            chart.timeScale().fitContent();
        }

        // Добавление индикатора
        function addIndicator(indicatorType) {
            if (!chart || !historicalData) return;

            // Удаляем старый индикатор если есть
            if (indicators[indicatorType]) {
                chart.removeSeries(indicators[indicatorType]);
                delete indicators[indicatorType];
            }

            if (indicatorType === 'sma7') {
                const smaData = [];
                for (let i = 6; i < historicalData.length; i++) {
                    let sum = 0;
                    for (let j = i - 6; j <= i; j++) {
                        sum += historicalData[j].close;
                    }
                    smaData.push({
                        time: historicalData[i].time,
                        value: sum / 7,
                    });
                }
                const smaSeries = chart.addLineSeries({ color: '#FF9800', lineWidth: 2, title: 'SMA 7' });
                smaSeries.setData(smaData);
                indicators[indicatorType] = smaSeries;
            } else if (indicatorType === 'sma25') {
                const smaData = [];
                for (let i = 24; i < historicalData.length; i++) {
                    let sum = 0;
                    for (let j = i - 24; j <= i; j++) {
                        sum += historicalData[j].close;
                    }
                    smaData.push({
                        time: historicalData[i].time,
                        value: sum / 25,
                    });
                }
                const smaSeries = chart.addLineSeries({ color: '#E91E63', lineWidth: 2, title: 'SMA 25' });
                smaSeries.setData(smaData);
                indicators[indicatorType] = smaSeries;
            } else if (indicatorType === 'ema12') {
                let ema = historicalData[0].close;
                const emaData = [{ time: historicalData[0].time, value: ema }];
                const multiplier = 2 / (12 + 1);
                for (let i = 1; i < historicalData.length; i++) {
                    ema = (historicalData[i].close - ema) * multiplier + ema;
                    emaData.push({ time: historicalData[i].time, value: ema });
                }
                const emaSeries = chart.addLineSeries({ color: '#9C27B0', lineWidth: 2, title: 'EMA 12' });
                emaSeries.setData(emaData);
                indicators[indicatorType] = emaSeries;
            }
        }

        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/duel/leaderboard');
                const leaders = await res.json();
                const container = document.getElementById('leaderboardList');
                if (!leaders.length) {
                    container.innerHTML = '<div class="leaderboard-row">Нет данных</div>';
                    return;
                }
                container.innerHTML = leaders.slice(0, 10).map((l, idx) => `
                    <div class="leaderboard-row">
                        <div class="rank">#${idx + 1}</div>
                        <div class="username">${l.username}</div>
                        <div class="rating">⭐ ${l.rating}</div>
                    </div>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function findOpponent() {
            if (!userId) { showNotification('Ошибка: пользователь не авторизован', 'error'); return; }

            const btn = document.getElementById('findBtn');
            btn.disabled = true;
            btn.textContent = '⏳ ПОИСК...';
            document.getElementById('duelStatus').innerHTML = '⏳ Поиск соперника...';

            try {
                const res = await fetch('/api/duel/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: parseInt(userId) })
                });
                const data = await res.json();

                if (data.success) {
                    currentDuelId = data.duel_id;
                    if (data.action === 'joined') {
                        showNotification('✅ Соперник найден! Дуэль начинается!', 'success');
                        startDuel(currentDuelId);
                    } else {
                        showNotification('✅ Ожидаем соперника...', 'success');
                        document.getElementById('duelStatus').innerHTML = '⏳ Ожидаем соперника...';
                        waitForOpponent(currentDuelId);
                    }
                } else {
                    showNotification(data.error || 'Ошибка поиска', 'error');
                    btn.disabled = false;
                    btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
                    document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника»';
                }
            } catch(e) {
                showNotification('Ошибка сервера', 'error');
                btn.disabled = false;
                btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
            }
        }

        async function waitForOpponent(duelId) {
            let attempts = 0;
            statusCheckInterval = setInterval(async () => {
                attempts++;
                try {
                    const res = await fetch(`/api/duel/status/${duelId}`);
                    const data = await res.json();
                    if (data.status === 'active') {
                        clearInterval(statusCheckInterval);
                        startDuel(duelId);
                    } else if (attempts >= 30) {
                        clearInterval(statusCheckInterval);
                        showNotification('Время поиска истекло', 'error');
                        resetDuel();
                    }
                } catch(e) { console.error(e); }
            }, 2000);
        }

        async function startDuel(duelId) {
            document.getElementById('duelContainer').style.display = 'flex';
            document.getElementById('findBtn').style.display = 'none';
            document.getElementById('duelStatus').innerHTML = '⚔️ ДУЭЛЬ НАЧАЛАСЬ! Анализируй график и сделай прогноз';

            // Генерируем данные для графика
            historicalData = generateRealisticData(120, 50000, 0);

            // Инициализируем график
            initChart();
            loadChartData(historicalData, 'candle');

            try {
                const res = await fetch(`/api/duel/status/${duelId}`);
                const data = await res.json();

                const p1RatingRes = await fetch(`/api/duel/rating/${data.player1_id}`);
                const p1Rating = await p1RatingRes.json();

                document.getElementById('p1Name').innerText = data.player1_id == userId ? 'Вы' : `Игрок ${data.player1_id}`;
                document.getElementById('p1Rating').innerText = `⭐ ${p1Rating.rating}`;

                if (data.player2_id) {
                    const p2RatingRes = await fetch(`/api/duel/rating/${data.player2_id}`);
                    const p2Rating = await p2RatingRes.json();
                    document.getElementById('p2Name').innerText = data.player2_id == userId ? 'Вы' : `Игрок ${data.player2_id}`;
                    document.getElementById('p2Rating').innerText = `⭐ ${p2Rating.rating}`;
                } else {
                    document.getElementById('p2Name').innerText = 'Ожидание...';
                    document.getElementById('p2Rating').innerText = '⭐ ?';
                }
            } catch(e) { console.error(e); }

            // Таймер 3 минуты
            let timeLeft = 180;
            const timerElem = document.getElementById('timer');
            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElem.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    resolveDuel(duelId);
                }
                timeLeft--;
            }, 1000);

            setupPredictionButtons(duelId);

            checkInterval = setInterval(async () => {
                try {
                    const checkRes = await fetch(`/api/duel/check_predictions/${duelId}`);
                    const checkData = await checkRes.json();
                    if (checkData.both_submitted) {
                        clearInterval(checkInterval);
                        showNotification('Оба игрока сделали прогноз!', 'success');
                        setTimeout(() => resolveDuel(duelId), 3000);
                    }
                } catch(e) { console.error(e); }
            }, 1000);
        }

        function setupPredictionButtons(duelId) {
            const buttons = document.querySelectorAll('.player-card .prediction-btn');
            buttons.forEach(btn => {
                btn.onclick = async () => {
                    if (myPrediction) {
                        showNotification('Вы уже сделали прогноз!', 'error');
                        return;
                    }
                    const direction = btn.dataset.dir;
                    try {
                        const res = await fetch('/api/duel/submit_prediction', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ duel_id: duelId, user_id: parseInt(userId), direction: direction })
                        });
                        const data = await res.json();
                        if (data.success) {
                            myPrediction = direction;
                            btn.classList.add('selected');
                            showNotification(`✅ Прогноз: ${direction === 'up' ? 'ВВЕРХ' : 'ВНИЗ'}`, 'success');
                            document.getElementById('p1PredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                            document.getElementById('p1PredictionArea').style.display = 'none';
                        } else {
                            showNotification(data.error || 'Ошибка', 'error');
                        }
                    } catch(e) {
                        showNotification('Ошибка отправки', 'error');
                    }
                };
            });
        }

        // Генерация будущего движения
        function generateFutureMovement(historicalData) {
            const lastPrice = historicalData[historicalData.length - 1].close;
            const futureBars = 15;
            const futureCandles = [];
            let price = lastPrice;
            let totalChange = 0;

            // Случайное направление тренда
            const trendDirection = Math.random() > 0.5 ? 1 : -1;

            for (let i = 0; i < futureBars; i++) {
                const change = (Math.random() - 0.45) * 0.025 + (trendDirection * 0.005);
                totalChange += change;
                price = price * (1 + change);

                const open = price;
                const close = price * (1 + (Math.random() - 0.5) * 0.012);
                const high = Math.max(open, close) * (1 + Math.random() * 0.01);
                const low = Math.min(open, close) * (1 - Math.random() * 0.01);
                const time = new Date(Date.now() + (i + 1) * 3600000);

                futureCandles.push({
                    time: time.toISOString().slice(0, 19),
                    open: open,
                    high: high,
                    low: low,
                    close: close
                });
            }

            const finalPriceChange = ((futureCandles[futureCandles.length - 1].close - lastPrice) / lastPrice) * 100;
            return { futureCandles, finalPriceChange, trendDirection: trendDirection > 0 ? 'up' : 'down' };
        }

        async function resolveDuel(duelId) {
            clearInterval(timerInterval);
            clearInterval(checkInterval);

            document.getElementById('duelStatus').innerHTML = '📊 Раскрываем результат...';

            // Генерируем будущее движение
            const { futureCandles, finalPriceChange, trendDirection } = generateFutureMovement(historicalData);
            fullData = [...historicalData, ...futureCandles];

            // Обновляем график с будущими свечами
            const candleData = fullData.map(d => ({
                time: d.time,
                open: d.open,
                high: d.high,
                low: d.low,
                close: d.close,
            }));

            candleSeries.setData(candleData);

            // Добавляем вертикальную линию
            const lastHistoricalTime = historicalData[historicalData.length - 1].time;
            const lineData = [{ time: lastHistoricalTime, value: historicalData[historicalData.length - 1].high }];

            chart.timeScale().fitContent();

            const resultText = finalPriceChange > 0 ? 'ВВЕРХ' : 'ВНИЗ';
            document.getElementById('duelStatus').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА!<br>Реальное движение: ${resultText} (${Math.abs(finalPriceChange).toFixed(2)}%)<br>Определяем победителя...`;

            // Отправляем результат на сервер
            try {
                const res = await fetch('/api/duel/resolve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duel_id: duelId })
                });
                const data = await res.json();

                if (data.success) {
                    let winText = '';
                    if (data.winner_id == userId) {
                        winText = '🎉 ПОБЕДА!';
                    } else if (data.winner_id) {
                        winText = '😔 ПОРАЖЕНИЕ';
                    } else {
                        winText = '🤝 НИЧЬЯ';
                    }
                    document.getElementById('duelStatus').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА!<br>Реальное движение: ${resultText} (${Math.abs(finalPriceChange).toFixed(2)}%)<br>${winText}`;
                    showNotification(`${winText}`, data.winner_id == userId ? 'success' : 'error');
                    await loadLeaderboard();
                }
            } catch(e) {
                console.error('Resolve error:', e);
            }

            setTimeout(() => resetDuel(), 8000);
        }

        function resetDuel() {
            if (statusCheckInterval) clearInterval(statusCheckInterval);
            if (timerInterval) clearInterval(timerInterval);
            if (checkInterval) clearInterval(checkInterval);

            currentDuelId = null;
            myPrediction = null;

            document.getElementById('duelContainer').style.display = 'none';
            document.getElementById('findBtn').style.display = 'block';
            document.getElementById('findBtn').disabled = false;
            document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
            document.getElementById('timer').textContent = '—';
            document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника», чтобы начать дуэль';
            document.getElementById('p1PredictionArea').style.display = 'block';
            document.getElementById('p1PredictionDisplay').innerHTML = '';
            document.getElementById('p2PredictionDisplay').innerHTML = '';

            const buttons = document.querySelectorAll('.prediction-btn');
            buttons.forEach(btn => btn.classList.remove('selected'));

            // Очищаем график
            if (chart) {
                chart.remove();
                chart = null;
            }
            const container = document.getElementById('chart-container');
            if (container) container.innerHTML = '';
        }

        // Обработчики кнопок графика
        document.getElementById('findBtn').onclick = findOpponent;

        // Делегирование событий для кнопок графика (они создаются после initChart)
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('chart-btn') && e.target.dataset.type) {
                const type = e.target.dataset.type;
                document.querySelectorAll('.chart-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                if (candleSeries && lineSeries && areaSeries) {
                    candleSeries.applyOptions({ visible: type === 'candle' });
                    lineSeries.applyOptions({ visible: type === 'line' });
                    areaSeries.applyOptions({ visible: type === 'area' });
                }
            }
            if (e.target.id === 'reset-zoom-btn') {
                if (chart) chart.timeScale().fitContent();
            }
        });

        document.addEventListener('change', (e) => {
            if (e.target.id === 'indicator-select') {
                const value = e.target.value;
                if (value) {
                    addIndicator(value);
                    e.target.value = '';
                }
            }
        });

        loadLeaderboard();
        setInterval(loadLeaderboard, 30000);

        // Предзагрузка графика для отображения
        setTimeout(() => {
            if (!chart) {
                const demoData = generateRealisticData(60, 50000, 0);
                initChart();
                loadChartData(demoData, 'candle');
            }
        }, 100);
    </script>
</body>
</html>
