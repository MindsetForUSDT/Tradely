<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tradeum — Дуэль трейдеров</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0A0E17; color: #E8EDF2; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Анимированная шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px; flex-wrap: wrap; gap: 12px; animation: fadeInDown 0.6s ease; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #00D09C); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { background: rgba(18, 22, 35, 0.8); backdrop-filter: blur(10px); color: white; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-size: 14px; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s; }
        .back-btn:hover { border-color: #00D09C; color: #00D09C; transform: translateY(-2px); }

        /* Анимированный статус */
        .status { text-align: center; padding: 20px; background: linear-gradient(135deg, #121624, #0F1320); border-radius: 16px; margin: 20px 0; font-size: 16px; border: 1px solid rgba(255, 255, 255, 0.05); animation: fadeInUp 0.6s ease; }

        /* Кнопка поиска */
        .find-btn { background: linear-gradient(135deg, #00D09C, #00A87D); color: #0A0E17; border: none; padding: 14px 40px; border-radius: 100px; font-size: 16px; font-weight: 700; cursor: pointer; display: block; margin: 20px auto; transition: all 0.3s; position: relative; overflow: hidden; }
        .find-btn::before { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255, 255, 255, 0.3); transform: translate(-50%, -50%); transition: width 0.6s, height 0.6s; }
        .find-btn:hover::before { width: 300px; height: 300px; }
        .find-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 208, 156, 0.4); }
        .find-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Карточки игроков */
        .duel-container { display: flex; gap: 20px; flex-wrap: wrap; margin: 30px 0; animation: fadeInUp 0.6s ease 0.2s both; }
        .player-card { flex: 1; background: linear-gradient(135deg, #121624, #0F1320); border-radius: 20px; padding: 24px; border: 1px solid rgba(255, 255, 255, 0.05); min-width: 260px; text-align: center; transition: all 0.3s; animation: slideIn 0.4s ease; }
        .player-card:hover { transform: translateY(-4px); border-color: rgba(0, 208, 156, 0.3); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .player-card h3 { margin-bottom: 16px; font-size: 18px; }
        .rating-badge { font-size: 28px; font-weight: 800; color: #FFD700; margin: 12px 0; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }

        /* Кнопки прогноза */
        .prediction-buttons { display: flex; gap: 12px; margin: 24px 0; justify-content: center; }
        .prediction-btn { padding: 12px 28px; border: none; border-radius: 100px; font-weight: 700; font-size: 16px; cursor: pointer; background: #1A1F2E; color: #E8EDF2; transition: all 0.3s; position: relative; overflow: hidden; }
        .prediction-btn.up:hover { background: rgba(0, 208, 156, 0.2); transform: scale(1.02); }
        .prediction-btn.down:hover { background: rgba(255, 77, 109, 0.2); transform: scale(1.02); }
        .prediction-btn.up.selected { background: linear-gradient(135deg, #00D09C, #00A87D); color: #0A0E17; box-shadow: 0 4px 15px rgba(0, 208, 156, 0.3); }
        .prediction-btn.down.selected { background: linear-gradient(135deg, #FF4D6D, #E63946); color: #0A0E17; box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3); }

        /* Таймер */
        .timer { text-align: center; font-size: 56px; font-weight: 800; margin: 20px 0; font-family: monospace; background: linear-gradient(135deg, #00D09C, #FFD700); -webkit-background-clip: text; background-clip: text; color: transparent; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Блок с графиком */
        .chart-wrapper { background: linear-gradient(135deg, #121624, #0F1320); border-radius: 20px; padding: 20px; margin: 20px 0; border: 1px solid rgba(255, 255, 255, 0.05); animation: fadeInUp 0.6s ease 0.3s both; }
        .chart-image-container { width: 100%; background: #0F1320; border-radius: 12px; overflow: hidden; text-align: center; }
        .chart-image { width: 100%; max-width: 100%; height: auto; display: block; transition: transform 0.3s; }
        .chart-image:hover { transform: scale(1.02); }
        .tools-hint { text-align: center; font-size: 12px; color: #A0A8C0; margin-top: 12px; padding: 10px; background: rgba(26, 31, 46, 0.8); border-radius: 8px; }

        /* Таблица лидеров */
        .leaderboard { margin-top: 40px; background: linear-gradient(135deg, #121624, #0F1320); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); animation: fadeInUp 0.6s ease 0.4s both; }
        .leaderboard h3 { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 16px; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; transition: all 0.3s; }
        .leaderboard-row:hover { background: rgba(0, 208, 156, 0.05); transform: translateX(4px); }
        .rank { font-weight: 700; color: #FFD700; width: 50px; }
        .username { flex: 1; }
        .rating { font-weight: 700; color: #00D09C; }

        /* Уведомления */
        .notification { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 12px; background: #1A1F2E; border-left: 3px solid; z-index: 1000; animation: slideInRight 0.3s ease; backdrop-filter: blur(10px); }
        .notification.success { border-color: #00D09C; background: linear-gradient(135deg, #1A1F2E, rgba(0, 208, 156, 0.1)); }
        .notification.error { border-color: #FF4D6D; background: linear-gradient(135deg, #1A1F2E, rgba(255, 77, 109, 0.1)); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Анимации */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 700px) {
            body { padding: 12px; }
            .duel-container { flex-direction: column; }
            .prediction-btn { padding: 10px 20px; font-size: 14px; }
            .timer { font-size: 40px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Trade<span style="color: #00D09C;">um</span> | Дуэль</div>
            <a href="javascript:history.back()" class="back-btn">← Назад</a>
        </div>

        <div id="duelStatus" class="status">⚔️ Нажмите «Найти соперника», чтобы начать дуэль</div>

        <div class="duel-container" id="duelContainer" style="display: none;">
            <div class="player-card">
                <h3>👤 <span id="p1Name">—</span></h3>
                <div class="rating-badge" id="p1Rating">—</div>
                <div id="p1PredictionArea">
                    <div class="prediction-buttons">
                        <button class="prediction-btn up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="prediction-btn down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div class="prediction-display" id="p1PredictionDisplay" style="margin-top: 12px; font-size: 13px; color: #A0A8C0;"></div>
            </div>
            <div class="player-card">
                <h3>👤 <span id="p2Name">—</span></h3>
                <div class="rating-badge" id="p2Rating">—</div>
                <div id="p2PredictionArea">
                    <div class="prediction-buttons">
                        <button class="prediction-btn up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="prediction-btn down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div class="prediction-display" id="p2PredictionDisplay" style="margin-top: 12px; font-size: 13px; color: #A0A8C0;"></div>
            </div>
        </div>

        <div class="timer" id="timer">—</div>

        <div class="chart-wrapper">
            <div class="chart-image-container" id="chartContainer">
                <img id="chartImage" class="chart-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%230F1320'/%3E%3Ctext x='400' y='200' text-anchor='middle' fill='%23A0A8C0' font-size='16' font-family='Arial'%3E📊 График для анализа%3C/text%3E%3C/svg%3E" alt="График для анализа">
            </div>
            <div class="tools-hint">
                📈 Анализируй график, используй свои знания и сделай точный прогноз!
            </div>
        </div>

        <button class="find-btn" id="findBtn">🔍 НАЙТИ СОПЕРНИКА</button>

        <div class="leaderboard">
            <h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <script>
        let userId = localStorage.getItem('tradeum_user_id');
        const urlParams = new URLSearchParams(window.location.search);
        if (!userId) userId = urlParams.get('user_id');
        if (userId) localStorage.setItem('tradeum_user_id', userId);

        if (!userId) {
            document.getElementById('duelStatus').innerHTML = '❌ Ошибка: не найден ID пользователя. <a href="/dashboard">Вернуться в дашборд</a>';
            document.getElementById('findBtn').disabled = true;
        }

        let currentDuelId = null;
        let myPrediction = null;
        let timerInterval = null;
        let checkInterval = null;
        let statusCheckInterval = null;

        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/duel/leaderboard');
                const leaders = await res.json();
                const container = document.getElementById('leaderboardList');
                if (!leaders.length) { container.innerHTML = '<div class="leaderboard-row">Нет данных</div>'; return; }
                container.innerHTML = leaders.slice(0, 10).map((l, idx) => `<div class="leaderboard-row"><div class="rank">#${idx + 1}</div><div class="username">${l.username}</div><div class="rating">⭐ ${l.rating}</div></div>`).join('');
            } catch(e) { console.error(e); }
        }

        async function findOpponent() {
            if (!userId) { showNotification('Ошибка: пользователь не авторизован', 'error'); return; }
            const btn = document.getElementById('findBtn');
            btn.disabled = true; btn.textContent = '⏳ ПОИСК...';
            document.getElementById('duelStatus').innerHTML = '⏳ Поиск соперника...';
            try {
                const res = await fetch('/api/duel/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: parseInt(userId) }) });
                const data = await res.json();
                if (data.success) {
                    currentDuelId = data.duel_id;
                    if (data.action === 'joined') { showNotification('✅ Соперник найден! Дуэль начинается!', 'success'); startDuel(currentDuelId); }
                    else { showNotification('✅ Ожидаем соперника...', 'success'); document.getElementById('duelStatus').innerHTML = '⏳ Ожидаем соперника...'; waitForOpponent(currentDuelId); }
                } else {
                    showNotification(data.error || 'Ошибка поиска', 'error');
                    btn.disabled = false; btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
                    document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника»';
                }
            } catch(e) { showNotification('Ошибка сервера', 'error'); btn.disabled = false; btn.textContent = '🔍 НАЙТИ СОПЕРНИКА'; }
        }

        async function waitForOpponent(duelId) {
            let attempts = 0;
            statusCheckInterval = setInterval(async () => {
                attempts++;
                try {
                    const res = await fetch(`/api/duel/status/${duelId}`);
                    const data = await res.json();
                    if (data.status === 'active') { clearInterval(statusCheckInterval); startDuel(duelId); }
                    else if (attempts >= 30) { clearInterval(statusCheckInterval); showNotification('Время поиска истекло', 'error'); resetDuel(); }
                } catch(e) { console.error(e); }
            }, 2000);
        }

        async function startDuel(duelId) {
            document.getElementById('duelContainer').style.display = 'flex';
            document.getElementById('findBtn').style.display = 'none';
            document.getElementById('duelStatus').innerHTML = '⚔️ ДУЭЛЬ НАЧАЛАСЬ! Анализируй график и сделай прогноз';

            const chartImg = document.getElementById('chartImage');
            chartImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%230F1320'/%3E%3Cpath d='M50,300 L150,280 L250,310 L350,250 L450,270 L550,200 L650,220 L750,180' stroke='%2300D09C' stroke-width='2' fill='none'/%3E%3Cpath d='M50,300 L150,280 L250,310 L350,250 L450,270 L550,200 L650,220 L750,180' stroke='%23FF4D6D' stroke-width='1' fill='none' stroke-dasharray='5,5'/%3E%3Ctext x='400' y='50' text-anchor='middle' fill='%23E8EDF2' font-size='14' font-family='Arial' font-weight='bold'%3EBTC/USDT - 1h Chart%3C/text%3E%3C/svg%3E";

            try {
                const res = await fetch(`/api/duel/status/${duelId}`);
                const data = await res.json();
                const p1RatingRes = await fetch(`/api/duel/rating/${data.player1_id}`);
                const p1Rating = await p1RatingRes.json();
                document.getElementById('p1Name').innerText = data.player1_id == userId ? 'Вы' : `Игрок ${data.player1_id}`;
                document.getElementById('p1Rating').innerText = `⭐ ${p1Rating.rating}`;
                if (data.player2_id) {
                    const p2RatingRes = await fetch(`/api/duel/rating/${data.player2_id}`);
                    const p2Rating = await p2RatingRes.json();
                    document.getElementById('p2Name').innerText = data.player2_id == userId ? 'Вы' : `Игрок ${data.player2_id}`;
                    document.getElementById('p2Rating').innerText = `⭐ ${p2Rating.rating}`;
                } else {
                    document.getElementById('p2Name').innerText = 'Ожидание...';
                    document.getElementById('p2Rating').innerText = '⭐ ?';
                }
            } catch(e) { console.error(e); }

            let timeLeft = 180;
            const timerElem = document.getElementById('timer');
            timerInterval = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElem.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); resolveDuel(duelId); }
                timeLeft--;
            }, 1000);

            setupPredictionButtons(duelId);

            checkInterval = setInterval(async () => {
                try {
                    const checkRes = await fetch(`/api/duel/check_predictions/${duelId}`);
                    const checkData = await checkRes.json();
                    if (checkData.both_submitted) { clearInterval(checkInterval); showNotification('Оба игрока сделали прогноз!', 'success'); setTimeout(() => resolveDuel(duelId), 3000); }
                } catch(e) { console.error(e); }
            }, 1000);
        }

        function setupPredictionButtons(duelId) {
            document.querySelectorAll('.player-card .prediction-btn').forEach(btn => {
                btn.onclick = async () => {
                    if (myPrediction) { showNotification('Вы уже сделали прогноз!', 'error'); return; }
                    const direction = btn.dataset.dir;
                    try {
                        const res = await fetch('/api/duel/submit_prediction', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ duel_id: duelId, user_id: parseInt(userId), direction: direction }) });
                        const data = await res.json();
                        if (data.success) {
                            myPrediction = direction;
                            btn.classList.add('selected');
                            showNotification(`✅ Прогноз: ${direction === 'up' ? 'ВВЕРХ' : 'ВНИЗ'}`, 'success');
                            document.getElementById('p1PredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                            document.getElementById('p1PredictionArea').style.display = 'none';
                        } else { showNotification(data.error || 'Ошибка', 'error'); }
                    } catch(e) { showNotification('Ошибка отправки', 'error'); }
                };
            });
        }

        async function resolveDuel(duelId) {
            clearInterval(timerInterval); clearInterval(checkInterval);
            document.getElementById('duelStatus').innerHTML = '📊 Раскрываем результат...';
            const chartImg = document.getElementById('chartImage');
            const finalDirection = Math.random() > 0.5 ? 'up' : 'down';
            const finalChange = (Math.random() * 5 + 1).toFixed(1);
            chartImg.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%230F1320'/%3E%3Cpath d='M50,300 L150,280 L250,310 L350,250 L450,270 L550,200 L650,220 L750,180' stroke='%2300D09C' stroke-width='2' fill='none'/%3E%3Cpath d='M750,180 L780,${finalDirection === 'up' ? '120' : '240'}' stroke='%23FFD700' stroke-width='3' fill='none' stroke-dasharray='8,4'/%3E%3Ctext x='400' y='50' text-anchor='middle' fill='%23FFD700' font-size='14' font-family='Arial' font-weight='bold'%3EРЕЗУЛЬТАТ: ${finalDirection === 'up' ? '📈 РОСТ' : '📉 ПАДЕНИЕ'} ${finalChange}%%3C/text%3E%3C/svg%3E`;
            setTimeout(async () => {
                try {
                    const res = await fetch('/api/duel/resolve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ duel_id: duelId }) });
                    const data = await res.json();
                    if (data.success) {
                        let winText = data.winner_id == userId ? '🎉 ПОБЕДА!' : (data.winner_id ? '😔 ПОРАЖЕНИЕ' : '🤝 НИЧЬЯ');
                        document.getElementById('duelStatus').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА!<br>Движение: ${finalDirection === 'up' ? 'ВВЕРХ' : 'ВНИЗ'} (${finalChange}%)<br>${winText}`;
                        showNotification(`${winText}`, data.winner_id == userId ? 'success' : 'error');
                        await loadLeaderboard();
                    }
                } catch(e) { console.error('Resolve error:', e); }
                setTimeout(() => resetDuel(), 8000);
            }, 2000);
        }

        function resetDuel() {
            if (statusCheckInterval) clearInterval(statusCheckInterval);
            if (timerInterval) clearInterval(timerInterval);
            if (checkInterval) clearInterval(checkInterval);
            currentDuelId = null; myPrediction = null;
            document.getElementById('duelContainer').style.display = 'none';
            document.getElementById('findBtn').style.display = 'block';
            document.getElementById('findBtn').disabled = false;
            document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
            document.getElementById('timer').textContent = '—';
            document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника», чтобы начать дуэль';
            document.getElementById('p1PredictionArea').style.display = 'block';
            document.getElementById('p1PredictionDisplay').innerHTML = '';
            document.getElementById('p2PredictionDisplay').innerHTML = '';
            document.querySelectorAll('.prediction-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('chartImage').src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%230F1320'/%3E%3Ctext x='400' y='200' text-anchor='middle' fill='%23A0A8C0' font-size='16' font-family='Arial'%3E📊 График для анализа%3C/text%3E%3C/svg%3E";
        }

        document.getElementById('findBtn').onclick = findOpponent;
        loadLeaderboard();
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
