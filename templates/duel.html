<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Дуэль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B0E14;
            color: #E6E8EC;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1F232C;
        }
        .logo { font-size: 26px; font-weight: 600; color: #FFFFFF; }
        .logo span { color: #F4B740; }
        .nav-link {
            color: #A1A6B0;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 40px;
            background: #141820;
            border: 1px solid #262B36;
        }

        .status-bar {
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 20px;
            padding: 18px 24px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 500;
        }

        .arena {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        .player-card {
            flex: 1;
            background: #12161E;
            border: 1px solid #1F232C;
            border-radius: 24px;
            padding: 28px;
            text-align: center;
        }
        .player-name { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        .player-rating { font-size: 28px; font-weight: 700; color: #F4B740; margin-bottom: 24px; }
        .prediction-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .pred-btn {
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            background: #141820;
            border: 1px solid #2E3440;
            color: #A1A6B0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .pred-btn.up.selected { background: #5EEAD4; border-color: #5EEAD4; color: #0B0E14; }
        .pred-btn.down.selected { background: #F87171; border-color: #F87171; color: #0B0E14; }

        .timer {
            font-size: 64px;
            font-weight: 700;
            text-align: center;
            margin: 16px 0;
            font-feature-settings: "tnum";
            color: #FFFFFF;
        }

        .find-btn {
            width: 100%;
            padding: 18px;
            background: #5EEAD4;
            color: #0B0E14;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            margin-top: 16px;
        }
        .find-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            background: #1A1F2A;
            border: 1px solid #2E3440;
            border-radius: 16px;
            z-index: 1000;
            animation: slide 0.3s ease;
        }
        .toast.success { border-left: 4px solid #5EEAD4; }
        .toast.error { border-left: 4px solid #F87171; }
        @keyframes slide { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo">Trade<span>um</span> · Дуэль</div>
        <a href="/dashboard" class="nav-link">← В терминал</a>
    </div>

    <div id="duelStatus" class="status-bar">⚡ Нажмите «Найти соперника»</div>

    <div id="duelContainer" style="display: none;">
        <div class="arena">
            <div class="player-card">
                <div class="player-name" id="p1Name">—</div>
                <div class="player-rating" id="p1Rating">—</div>
                <div id="p1PredictionArea">
                    <div class="prediction-btns">
                        <div class="pred-btn up" data-dir="up">▲ Рост</div>
                        <div class="pred-btn down" data-dir="down">▼ Падение</div>
                    </div>
                </div>
                <div id="p1PredictionDisplay" style="margin-top: 16px; color: #7A8190;"></div>
            </div>
            <div class="player-card">
                <div class="player-name" id="p2Name">—</div>
                <div class="player-rating" id="p2Rating">—</div>
                <div id="p2PredictionArea">
                    <div class="prediction-btns">
                        <div class="pred-btn up" data-dir="up">▲ Рост</div>
                        <div class="pred-btn down" data-dir="down">▼ Падение</div>
                    </div>
                </div>
                <div id="p2PredictionDisplay" style="margin-top: 16px; color: #7A8190;"></div>
            </div>
        </div>
        <div class="timer" id="timer">3:00</div>
    </div>

    <button class="find-btn" id="findBtn">Найти соперника</button>
</div>

<script>
    let userId = localStorage.getItem('tradeum_user_id');
    const urlParams = new URLSearchParams(window.location.search);
    if (!userId) userId = urlParams.get('user_id');
    if (userId) localStorage.setItem('tradeum_user_id', userId);

    if (!userId) {
        document.getElementById('duelStatus').innerHTML = '❌ Ошибка авторизации. <a href="/dashboard">Войдите</a>';
        document.getElementById('findBtn').disabled = true;
    }

    let currentDuelId = null, myPrediction = null, timerInterval = null, checkInterval = null, statusCheckInterval = null;

    function showNotification(msg, type) {
        const div = document.createElement('div');
        div.className = `toast ${type}`;
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    async function findOpponent() {
        if (!userId) return;
        const btn = document.getElementById('findBtn');
        btn.disabled = true; btn.textContent = 'Поиск...';
        document.getElementById('duelStatus').innerHTML = 'Поиск соперника...';
        try {
            const res = await fetch('/api/duel/create', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: parseInt(userId) })
            });
            const data = await res.json();
            if (data.success) {
                currentDuelId = data.duel_id;
                if (data.action === 'joined') {
                    showNotification('Соперник найден!', 'success');
                    startDuel(currentDuelId);
                } else {
                    showNotification('Ожидание соперника...', 'success');
                    document.getElementById('duelStatus').innerHTML = 'Ожидание второго игрока...';
                    waitForOpponent(currentDuelId);
                }
            } else {
                showNotification(data.error || 'Ошибка', 'error');
                btn.disabled = false; btn.textContent = 'Найти соперника';
            }
        } catch(e) { showNotification('Ошибка сервера', 'error'); btn.disabled = false; btn.textContent = 'Найти соперника'; }
    }

    async function waitForOpponent(duelId) {
        let attempts = 0;
        statusCheckInterval = setInterval(async () => {
            attempts++;
            try {
                const res = await fetch(`/api/duel/status/${duelId}`);
                const data = await res.json();
                if (data.status === 'active') {
                    clearInterval(statusCheckInterval);
                    startDuel(duelId);
                } else if (attempts >= 30) {
                    clearInterval(statusCheckInterval);
                    showNotification('Время поиска истекло', 'error');
                    resetDuel();
                }
            } catch(e) { console.error(e); }
        }, 2000);
    }

    async function startDuel(duelId) {
        document.getElementById('duelContainer').style.display = 'block';
        document.getElementById('findBtn').style.display = 'none';
        document.getElementById('duelStatus').innerHTML = 'Сделайте прогноз';

        try {
            const res = await fetch(`/api/duel/status/${duelId}`);
            const data = await res.json();
            const p1 = await fetch(`/api/duel/rating/${data.player1_id}`).then(r => r.json());
            document.getElementById('p1Name').innerText = data.player1_id == userId ? 'Вы' : `Игрок #${data.player1_id}`;
            document.getElementById('p1Rating').innerText = p1.rating;

            if (data.player2_id) {
                const p2 = await fetch(`/api/duel/rating/${data.player2_id}`).then(r => r.json());
                document.getElementById('p2Name').innerText = data.player2_id == userId ? 'Вы' : `Игрок #${data.player2_id}`;
                document.getElementById('p2Rating').innerText = p2.rating;
            }
        } catch(e) { console.error(e); }

        let timeLeft = 180;
        const timerElem = document.getElementById('timer');
        timerInterval = setInterval(() => {
            const m = Math.floor(timeLeft/60), s = timeLeft%60;
            timerElem.textContent = `${m}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) { clearInterval(timerInterval); resolveDuel(duelId); }
            timeLeft--;
        }, 1000);

        setupPredictionButtons(duelId);
        checkInterval = setInterval(async () => {
            try {
                const checkRes = await fetch(`/api/duel/check_predictions/${duelId}`);
                const checkData = await checkRes.json();
                if(checkData.both_submitted) {
                    clearInterval(checkInterval);
                    showNotification('Оба игрока сделали выбор', 'success');
                    setTimeout(() => resolveDuel(duelId), 3000);
                }
            } catch(e) { console.error(e); }
        }, 1000);
    }

    function setupPredictionButtons(duelId) {
        document.querySelectorAll('.player-card .pred-btn').forEach(btn => {
            btn.onclick = async () => {
                if(myPrediction) { showNotification('Прогноз уже сделан', 'error'); return; }
                const direction = btn.dataset.dir;
                try {
                    const res = await fetch('/api/duel/submit_prediction', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ duel_id: duelId, user_id: parseInt(userId), direction: direction })
                    });
                    const data = await res.json();
                    if(data.success) {
                        myPrediction = direction;
                        btn.classList.add('selected');
                        showNotification(`Прогноз: ${direction === 'up' ? 'Рост' : 'Падение'}`, 'success');
                        document.getElementById('p1PredictionDisplay').innerHTML = `Ваш выбор: ${direction === 'up' ? '▲ Рост' : '▼ Падение'}`;
                        document.getElementById('p1PredictionArea').style.display = 'none';
                    } else { showNotification(data.error || 'Ошибка', 'error'); }
                } catch(e) { showNotification('Ошибка', 'error'); }
            };
        });
    }

    async function resolveDuel(duelId) {
        clearInterval(timerInterval); clearInterval(checkInterval);
        document.getElementById('duelStatus').innerHTML = 'Определение победителя...';
        try {
            const res = await fetch('/api/duel/resolve', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duel_id: duelId })
            });
            const data = await res.json();
            if(data.success) {
                let winText = data.winner_id == userId ? 'Победа!' : (data.winner_id ? 'Поражение' : 'Ничья');
                document.getElementById('duelStatus').innerHTML = `Результат: ${data.real_direction} (${data.price_change_pct}%). ${winText}`;
                showNotification(winText, data.winner_id == userId ? 'success' : 'error');
            }
        } catch(e) { console.error(e); }
        setTimeout(() => resetDuel(), 8000);
    }

    function resetDuel() {
        if(statusCheckInterval) clearInterval(statusCheckInterval);
        if(timerInterval) clearInterval(timerInterval);
        if(checkInterval) clearInterval(checkInterval);
        currentDuelId=null; myPrediction=null;
        document.getElementById('duelContainer').style.display='none';
        document.getElementById('findBtn').style.display='block';
        document.getElementById('findBtn').disabled=false;
        document.getElementById('findBtn').textContent='Найти соперника';
        document.getElementById('timer').textContent='3:00';
        document.getElementById('duelStatus').innerHTML='⚡ Нажмите «Найти соперника»';
        document.getElementById('p1PredictionArea').style.display='block';
        document.getElementById('p1PredictionDisplay').innerHTML='';
        document.querySelectorAll('.pred-btn').forEach(btn=>btn.classList.remove('selected'));
    }

    document.getElementById('findBtn').onclick = findOpponent;
</script>
</body>
</html>
