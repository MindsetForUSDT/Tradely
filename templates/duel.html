<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Дуэль</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; padding: 24px; }
        .container { max-width: 1200px; margin: 0 auto; }

        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #1F232C; margin-bottom: 24px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-btn { background: #12161E; padding: 8px 20px; border-radius: 40px; text-decoration: none; color: #A1A6B0; border: 1px solid #262B36; transition: all 0.3s; }
        .back-btn:hover { border-color: #5EEAD4; color: #FFFFFF; }

        .status { text-align: center; padding: 20px; background: #12161E; border: 1px solid #1F232C; border-radius: 20px; margin: 20px 0; }
        .find-btn { background: #5EEAD4; color: #0A0C10; border: none; padding: 14px 40px; border-radius: 100px; font-size: 16px; font-weight: 700; cursor: pointer; display: block; margin: 20px auto; transition: all 0.3s; }
        .find-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(94, 234, 212, 0.3); }
        .find-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .duel-container { display: flex; gap: 24px; flex-wrap: wrap; margin: 30px 0; }
        .player-card { flex: 1; background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 28px; text-align: center; min-width: 260px; }
        .player-name { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .player-rating { font-size: 28px; font-weight: 700; color: #F4B740; margin-bottom: 20px; }
        .prediction-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .pred-btn { padding: 12px 28px; border-radius: 60px; font-weight: 700; background: #0A0C10; border: 1px solid #262B36; color: #A1A6B0; cursor: pointer; transition: all 0.2s; }
        .pred-btn.up.selected { background: #5EEAD4; border-color: #5EEAD4; color: #0A0C10; }
        .pred-btn.down.selected { background: #F87171; border-color: #F87171; color: #0A0C10; }

        .timer { text-align: center; font-size: 56px; font-weight: 800; margin: 20px 0; font-family: monospace; background: linear-gradient(135deg, #5EEAD4, #F4B740); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .chart-wrapper { background: #12161E; border: 1px solid #1F232C; border-radius: 20px; padding: 20px; margin: 20px 0; }
        .chart-image { width: 100%; max-width: 100%; height: auto; display: block; border-radius: 12px; }
        .tools-hint { text-align: center; font-size: 12px; color: #7A8190; margin-top: 12px; }

        .leaderboard { margin-top: 40px; background: #12161E; border: 1px solid #1F232C; border-radius: 20px; overflow: hidden; }
        .leaderboard h3 { padding: 16px 20px; border-bottom: 1px solid #1F232C; }
        .leaderboard-row { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #1F232C; transition: all 0.3s; }
        .leaderboard-row:hover { background: rgba(94, 234, 212, 0.05); }
        .rank { font-weight: 700; color: #F4B740; width: 50px; }
        .username { flex: 1; }
        .rating { font-weight: 700; color: #5EEAD4; }

        .notification { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 12px; background: #1A1F2A; border-left: 3px solid; z-index: 1000; animation: slideIn 0.3s ease; }
        .notification.success { border-color: #5EEAD4; }
        .notification.error { border-color: #F87171; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 700px) { body { padding: 16px; } .duel-container { flex-direction: column; } .timer { font-size: 40px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Trade<span>um</span> · Дуэль</div>
        <a href="/dashboard" class="back-btn">← Назад</a>
    </div>

    <div id="duelStatus" class="status">⚔️ Нажмите «Найти соперника», чтобы начать дуэль</div>

    <div class="duel-container" id="duelContainer" style="display: none;">
        <div class="player-card">
            <div class="player-name" id="p1Name">Вы</div>
            <div class="player-rating" id="p1Rating">—</div>
            <div id="p1PredictionArea">
                <div class="prediction-btns">
                    <div class="pred-btn up" data-dir="up">📈 ВВЕРХ</div>
                    <div class="pred-btn down" data-dir="down">📉 ВНИЗ</div>
                </div>
            </div>
            <div id="p1PredictionDisplay" style="margin-top: 16px; color: #7A8190;"></div>
        </div>
        <div class="player-card">
            <div class="player-name" id="p2Name">Соперник</div>
            <div class="player-rating" id="p2Rating">—</div>
            <div id="p2PredictionDisplay" style="margin-top: 16px; color: #7A8190;"></div>
        </div>
    </div>

    <div class="timer" id="timer">—</div>

    <div class="chart-wrapper">
        <img id="chartImage" class="chart-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%2312161E'/%3E%3Ctext x='400' y='200' text-anchor='middle' fill='%237A8190' font-size='16'%3E📊 График для анализа%3C/text%3E%3C/svg%3E" alt="График">
        <div class="tools-hint">📈 Анализируйте график и сделайте точный прогноз!</div>
    </div>

    <button class="find-btn" id="findBtn">🔍 НАЙТИ СОПЕРНИКА</button>

    <div class="leaderboard">
        <h3>🏆 ТАБЛИЦА ЛИДЕРОВ</h3>
        <div id="leaderboardList"></div>
    </div>
</div>

<script>
    const userId = {{ user_id }};
    let currentDuelId = null, myPrediction = null, timerInterval = null, checkInterval = null, statusCheckInterval = null;

    function showNotification(msg, type) { const div = document.createElement('div'); div.className = `notification ${type}`; div.innerText = msg; document.body.appendChild(div); setTimeout(() => div.remove(), 3000); }

    async function loadLeaderboard() {
        try { const res = await fetch('/api/duel/leaderboard'); const leaders = await res.json(); const container = document.getElementById('leaderboardList'); if (!leaders.length) { container.innerHTML = '<div class="leaderboard-row">Нет данных</div>'; return; } container.innerHTML = leaders.slice(0, 10).map((l, idx) => `<div class="leaderboard-row"><div class="rank">#${idx + 1}</div><div class="username">${l.username}</div><div class="rating">⭐ ${l.rating}</div></div>`).join(''); } catch(e) { console.error(e); } }

    async function findOpponent() {
        const btn = document.getElementById('findBtn');
        btn.disabled = true; btn.textContent = '⏳ ПОИСК...';
        document.getElementById('duelStatus').innerHTML = '⏳ Поиск соперника...';
        try {
            const res = await fetch('/api/duel/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId }) });
            const data = await res.json();
            if (data.success) {
                currentDuelId = data.duel_id;
                if (data.action === 'joined') { showNotification('✅ Соперник найден! Дуэль начинается!', 'success'); startDuel(currentDuelId); }
                else { showNotification('✅ Ожидаем соперника...', 'success'); document.getElementById('duelStatus').innerHTML = '⏳ Ожидаем соперника...'; waitForOpponent(currentDuelId); }
            } else { showNotification(data.error || 'Ошибка поиска', 'error'); btn.disabled = false; btn.textContent = '🔍 НАЙТИ СОПЕРНИКА'; document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника»'; }
        } catch(e) { showNotification('Ошибка сервера', 'error'); btn.disabled = false; btn.textContent = '🔍 НАЙТИ СОПЕРНИКА'; }
    }

    async function waitForOpponent(duelId) { let attempts = 0; statusCheckInterval = setInterval(async () => { attempts++; try { const res = await fetch(`/api/duel/status/${duelId}`); const data = await res.json(); if (data.status === 'active') { clearInterval(statusCheckInterval); startDuel(duelId); } else if (attempts >= 30) { clearInterval(statusCheckInterval); showNotification('Время поиска истекло', 'error'); resetDuel(); } } catch(e) { console.error(e); } }, 2000); }

    async function startDuel(duelId) {
        document.getElementById('duelContainer').style.display = 'flex';
        document.getElementById('findBtn').style.display = 'none';
        document.getElementById('duelStatus').innerHTML = '⚔️ ДУЭЛЬ НАЧАЛАСЬ! Сделайте прогноз';
        document.getElementById('chartImage').src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%2312161E'/%3E%3Cpath d='M50,300 L150,280 L250,310 L350,250 L450,270 L550,200 L650,220 L750,180' stroke='%235EEAD4' stroke-width='2' fill='none'/%3E%3Ctext x='400' y='50' text-anchor='middle' fill='%23FFFFFF' font-size='14'%3EBTC/USDT - Анализируйте!%3C/text%3E%3C/svg%3E";
        try {
            const res = await fetch(`/api/duel/status/${duelId}`); const data = await res.json();
            const p1 = await fetch(`/api/duel/rating/${data.player1_id}`).then(r => r.json());
            document.getElementById('p1Rating').innerText = p1.rating;
            if (data.player2_id) { const p2 = await fetch(`/api/duel/rating/${data.player2_id}`).then(r => r.json()); document.getElementById('p2Name').innerText = `Игрок ${data.player2_id}`; document.getElementById('p2Rating').innerText = p2.rating; }
            else { document.getElementById('p2Name').innerText = 'Ожидание...'; document.getElementById('p2Rating').innerText = '⭐ ?'; }
        } catch(e) { console.error(e); }

        let timeLeft = 180; const timerElem = document.getElementById('timer');
        timerInterval = setInterval(() => { const m = Math.floor(timeLeft/60), s = timeLeft%60; timerElem.textContent = `${m}:${s.toString().padStart(2,'0')}`; if(timeLeft <= 0){ clearInterval(timerInterval); resolveDuel(duelId); } timeLeft--; }, 1000);

        setupPredictionButtons(duelId);
        checkInterval = setInterval(async () => { try { const checkRes = await fetch(`/api/duel/check_predictions/${duelId}`); const checkData = await checkRes.json(); if(checkData.both_submitted){ clearInterval(checkInterval); showNotification('Оба игрока сделали прогноз!', 'success'); setTimeout(() => resolveDuel(duelId), 3000); } } catch(e) { console.error(e); } }, 1000);
    }

    function setupPredictionButtons(duelId) {
        document.querySelectorAll('.pred-btn').forEach(btn => {
            btn.onclick = async () => {
                if(myPrediction){ showNotification('Вы уже сделали прогноз!', 'error'); return; }
                const direction = btn.dataset.dir;
                try {
                    const res = await fetch('/api/duel/submit_prediction', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ duel_id: duelId, user_id: userId, direction: direction }) });
                    const data = await res.json();
                    if(data.success){ myPrediction = direction; btn.classList.add('selected'); showNotification(`✅ Прогноз: ${direction === 'up' ? 'ВВЕРХ' : 'ВНИЗ'}`, 'success'); document.getElementById('p1PredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`; document.getElementById('p1PredictionArea').style.display = 'none'; }
                    else { showNotification(data.error || 'Ошибка', 'error'); }
                } catch(e) { showNotification('Ошибка отправки', 'error'); }
            };
        });
    }

    async function resolveDuel(duelId) {
        clearInterval(timerInterval); clearInterval(checkInterval);
        document.getElementById('duelStatus').innerHTML = '📊 Раскрываем результат...';
        setTimeout(async () => {
            try {
                const res = await fetch('/api/duel/resolve', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ duel_id: duelId }) });
                const data = await res.json();
                if(data.success){
                    const winText = data.winner_id == userId ? '🎉 ПОБЕДА!' : (data.winner_id ? '😔 ПОРАЖЕНИЕ' : '🤝 НИЧЬЯ');
                    document.getElementById('duelStatus').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА!<br>Движение: ${data.price_change_pct > 0 ? '📈 ВВЕРХ' : '📉 ВНИЗ'} (${Math.abs(data.price_change_pct).toFixed(2)}%)<br>${winText}`;
                    showNotification(winText, data.winner_id == userId ? 'success' : 'error');
                    await loadLeaderboard();
                }
            } catch(e) { console.error('Resolve error:', e); }
            setTimeout(() => resetDuel(), 8000);
        }, 2000);
    }

    function resetDuel() {
        if(statusCheckInterval) clearInterval(statusCheckInterval); if(timerInterval) clearInterval(timerInterval); if(checkInterval) clearInterval(checkInterval);
        currentDuelId = null; myPrediction = null;
        document.getElementById('duelContainer').style.display = 'none';
        document.getElementById('findBtn').style.display = 'block'; document.getElementById('findBtn').disabled = false; document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
        document.getElementById('timer').textContent = '—';
        document.getElementById('duelStatus').innerHTML = '⚔️ Нажмите «Найти соперника», чтобы начать дуэль';
        document.getElementById('p1PredictionArea').style.display = 'block';
        document.getElementById('p1PredictionDisplay').innerHTML = ''; document.getElementById('p2PredictionDisplay').innerHTML = '';
        document.querySelectorAll('.pred-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('chartImage').src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%2312161E'/%3E%3Ctext x='400' y='200' text-anchor='middle' fill='%237A8190' font-size='16'%3E📊 График для анализа%3C/text%3E%3C/svg%3E";
    }

    document.getElementById('findBtn').onclick = findOpponent;
    loadLeaderboard(); setInterval(loadLeaderboard, 30000);
</script>
</body>
</html>
