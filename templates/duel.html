<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradeum · Дуэли</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0C10; color: #E6E8EC; padding: 24px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #FFFFFF, #5EEAD4); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .back-link { background: #12161E; padding: 10px 22px; border-radius: 40px; text-decoration: none; color: #A1A6B0; border: 1px solid #262B36; transition: all 0.3s; }
        .back-link:hover { border-color: #5EEAD4; color: #FFFFFF; }

        .mode-selector { display: flex; gap: 16px; margin-bottom: 24px; }
        .mode-btn { flex: 1; padding: 16px; background: #12161E; border: 1px solid #1F232C; border-radius: 16px; color: #A1A6B0; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.3s; }
        .mode-btn.active { background: #5EEAD4; color: #0A0C10; border-color: #5EEAD4; }

        .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .bot-card { background: #12161E; border: 1px solid #1F232C; border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; }
        .bot-card:hover { border-color: #F4B740; transform: translateY(-2px); }
        .bot-card.selected { border-color: #F4B740; background: rgba(244, 183, 64, 0.05); }
        .bot-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .bot-rating { font-size: 24px; font-weight: 700; color: #F4B740; margin-bottom: 8px; }
        .bot-desc { font-size: 12px; color: #7A8190; }

        .chart-container { background: #0A0C10; border-radius: 16px; padding: 20px; margin: 20px 0; }
        canvas { width: 100% !important; height: 300px !important; }

        .duel-container { background: #12161E; border: 1px solid #1F232C; border-radius: 24px; padding: 32px; margin-top: 24px; display: none; }
        .players { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }
        .player-card { flex: 1; background: #0A0C10; border-radius: 20px; padding: 24px; text-align: center; }
        .player-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .player-rating { font-size: 28px; font-weight: 700; color: #5EEAD4; margin-bottom: 20px; }
        .duel-pred { padding: 12px 28px; border-radius: 40px; font-weight: 700; cursor: pointer; background: #0A0C10; border: none; transition: all 0.3s; margin: 0 5px; }
        .duel-pred.up { border: 1px solid #5EEAD4; color: #5EEAD4; }
        .duel-pred.up:hover { background: #5EEAD4; color: #0A0C10; }
        .duel-pred.down { border: 1px solid #F87171; color: #F87171; }
        .duel-pred.down:hover { background: #F87171; color: #0A0C10; }
        .timer { font-size: 48px; font-weight: 700; text-align: center; margin: 20px 0; font-family: monospace; }
        .duel-status { text-align: center; padding: 16px; background: #0A0C10; border-radius: 16px; margin-top: 20px; color: #7A8190; }
        .find-btn { width: 100%; padding: 16px; background: #5EEAD4; color: #0A0C10; border: none; border-radius: 40px; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 16px; transition: all 0.3s; }
        .find-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(94, 234, 212, 0.3); }
        .find-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 12px; background: #1A1F2A; border-left: 3px solid; z-index: 1000; animation: slideIn 0.3s ease; }
        .notification.success { border-color: #5EEAD4; }
        .notification.error { border-color: #F87171; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 600px) { body { padding: 16px; } .players { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">Trade<span>um</span> · Дуэли</div>
        <a href="/dashboard" class="back-link">← Назад</a>
    </div>

    <div class="mode-selector">
        <div class="mode-btn active" data-mode="pvp">⚔️ PvP Дуэль</div>
        <div class="mode-btn" data-mode="bot">🤖 Против ИИ</div>
    </div>

    <div id="botSelection" class="hidden">
        <div class="bots-grid" id="botsList"></div>
    </div>

    <div class="chart-container">
        <canvas id="duelChart"></canvas>
    </div>

    <div id="duelStatus" class="duel-status">⚡ Выберите режим дуэли</div>
    <button class="find-btn" id="findBtn">🔍 НАЙТИ СОПЕРНИКА</button>

    <div class="duel-container" id="duelContainer">
        <div class="players">
            <div class="player-card">
                <div class="player-name">Вы</div>
                <div class="player-rating" id="myRating">—</div>
                <div id="myPredictionArea">
                    <div>
                        <button class="duel-pred up" data-dir="up">📈 ВВЕРХ</button>
                        <button class="duel-pred down" data-dir="down">📉 ВНИЗ</button>
                    </div>
                </div>
                <div id="myPredictionDisplay" style="margin-top: 16px;"></div>
            </div>
            <div class="player-card">
                <div class="player-name" id="opponentName">Соперник</div>
                <div class="player-rating" id="opponentRating">—</div>
                <div id="opponentPredictionDisplay" style="margin-top: 16px;"></div>
            </div>
        </div>
        <div class="timer" id="timer">30</div>
        <div class="duel-status" id="duelMessage">Ожидание прогноза...</div>
    </div>
</div>

<script>
    const userId = {{ user_id }};
    let currentMode = 'pvp';
    let selectedBot = null;
    let currentDuelId = null;
    let myPrediction = null;
    let timerInterval = null;
    let checkInterval = null;
    let isBotDuel = false;
    let duelChart = null;

    const bots = [
        { id: 1, name: "Трендовый Аналитик", rating: 580, desc: "Специализируется на определении трендов", accuracy: 0.65 },
        { id: 2, name: "Контрарный Торговец", rating: 520, desc: "Ищет развороты на перекупленности", accuracy: 0.55 },
        { id: 3, name: "Волатильный Мастер", rating: 610, desc: "Идеален для нестабильного рынка", accuracy: 0.70 },
        { id: 4, name: "Скальпер", rating: 490, desc: "Быстрые решения на малых таймфреймах", accuracy: 0.50 },
        { id: 5, name: "Фундаментальный Бот", rating: 550, desc: "Анализирует новости и события", accuracy: 0.60 }
    ];

    function generateChartData() {
        const points = [];
        let price = 50000;
        for (let i = 0; i < 50; i++) {
            price = price * (1 + (Math.random() - 0.5) * 0.015);
            points.push(price);
        }
        return points;
    }

    function initChart() {
        const ctx = document.getElementById('duelChart').getContext('2d');
        const data = generateChartData();
        if (duelChart) duelChart.destroy();
        duelChart = new Chart(ctx, {
            type: 'line',
            data: { labels: data.map((_, i) => i + 1), datasets: [{ label: 'BTC/USDT', data: data, borderColor: '#5EEAD4', backgroundColor: 'rgba(94,234,212,0.1)', fill: true, tension: 0.3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#A1A6B0' } }, tooltip: { callbacks: { label: (ctx) => `$${ctx.raw.toFixed(2)}` } } }, scales: { y: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0', callback: (v) => `$${v.toFixed(0)}` } }, x: { grid: { color: '#1F232C' }, ticks: { color: '#A1A6B0' } } } }
        });
    }

    function showNotification(msg, type) {
        const div = document.createElement('div');
        div.className = `notification ${type}`;
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    function renderBots() {
        const container = document.getElementById('botsList');
        container.innerHTML = bots.map(bot => `
            <div class="bot-card" data-bot-id="${bot.id}">
                <div class="bot-name">🤖 ${bot.name}</div>
                <div class="bot-rating">⭐ ${bot.rating}</div>
                <div class="bot-desc">${bot.desc}</div>
            </div>
        `).join('');
        document.querySelectorAll('.bot-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.bot-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedBot = parseInt(card.dataset.botId);
            });
        });
    }

    async function findOpponent() {
        if (currentMode === 'bot' && !selectedBot) {
            showNotification('Выберите ИИ-бота', 'error');
            return;
        }

        const btn = document.getElementById('findBtn');
        btn.disabled = true;
        btn.textContent = '⏳ ПОИСК...';
        document.getElementById('duelStatus').innerHTML = currentMode === 'pvp' ? 'Поиск соперника...' : 'Запуск дуэли с ботом...';

        try {
            const body = currentMode === 'bot' ? { user_id: userId, bot_id: selectedBot } : { user_id: userId };
            const res = await fetch('/api/duel/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if (data.success) {
                currentDuelId = data.duel_id;
                isBotDuel = data.action === 'vs_bot' || currentMode === 'bot';
                document.getElementById('duelContainer').style.display = 'block';
                btn.style.display = 'none';
                document.getElementById('duelStatus').style.display = 'none';
                startDuel();
            } else {
                showNotification(data.error || 'Ошибка', 'error');
                btn.disabled = false;
                btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
            }
        } catch(e) {
            showNotification('Ошибка сервера', 'error');
            btn.disabled = false;
            btn.textContent = '🔍 НАЙТИ СОПЕРНИКА';
        }
    }

    async function startDuel() {
        const stats = await fetch(`/api/user/stats/${userId}`).then(r => r.json());
        document.getElementById('myRating').innerText = stats.duel_rating;

        if (isBotDuel && selectedBot) {
            const bot = bots.find(b => b.id === selectedBot);
            document.getElementById('opponentName').innerHTML = `🤖 ${bot.name}`;
            document.getElementById('opponentRating').innerText = bot.rating;
        } else {
            document.getElementById('opponentName').innerText = 'Соперник';
            document.getElementById('opponentRating').innerText = '500';
        }

        let timeLeft = 30;
        const timerElem = document.getElementById('timer');
        timerInterval = setInterval(() => {
            timerElem.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                resolveDuel();
            }
            timeLeft--;
        }, 1000);

        setupPredictionButtons();

        if (isBotDuel && selectedBot) {
            setTimeout(() => {
                const bot = bots.find(b => b.id === selectedBot);
                const botPred = Math.random() < bot.accuracy ? 'up' : (Math.random() > 0.5 ? 'down' : 'up');
                document.getElementById('opponentPredictionDisplay').innerHTML = `Прогноз бота: ${botPred === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}<br><small>Уверенность: ${Math.round(bot.accuracy * 100)}%</small>`;
                setTimeout(() => resolveDuel(), 2000);
            }, 1500);
        }

        checkInterval = setInterval(async () => {
            try {
                const checkRes = await fetch(`/api/duel/check/${currentDuelId}`);
                const checkData = await checkRes.json();
                if (checkData.both_submitted) {
                    clearInterval(checkInterval);
                    setTimeout(() => resolveDuel(), 2000);
                }
            } catch(e) {}
        }, 1000);
    }

    function setupPredictionButtons() {
        document.querySelectorAll('.duel-pred').forEach(btn => {
            btn.onclick = async () => {
                if (myPrediction) {
                    showNotification('Вы уже сделали прогноз!', 'error');
                    return;
                }
                const direction = btn.dataset.dir;
                try {
                    const res = await fetch('/api/duel/submit_prediction', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ duel_id: currentDuelId, user_id: userId, direction: direction })
                    });
                    const data = await res.json();
                    if (data.success) {
                        myPrediction = direction;
                        btn.style.background = direction === 'up' ? '#5EEAD4' : '#F87171';
                        btn.style.color = '#0A0C10';
                        showNotification(`Прогноз: ${direction === 'up' ? 'ВВЕРХ' : 'ВНИЗ'}`, 'success');
                        document.getElementById('myPredictionDisplay').innerHTML = `Ваш прогноз: ${direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}`;
                        document.getElementById('myPredictionArea').style.display = 'none';
                        document.getElementById('duelMessage').innerHTML = '✅ Прогноз принят. Ожидаем результат...';
                    }
                } catch(e) { showNotification('Ошибка', 'error'); }
            };
        });
    }

    async function resolveDuel() {
        clearInterval(timerInterval);
        clearInterval(checkInterval);
        document.getElementById('duelMessage').innerHTML = '📊 Определение победителя...';

        try {
            const res = await fetch('/api/duel/resolve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ duel_id: currentDuelId })
            });
            const data = await res.json();

            if (data.success) {
                const isWinner = data.winner_id == userId;
                const winText = isWinner ? '🎉 ПОБЕДА!' : (data.winner_id ? '😔 ПОРАЖЕНИЕ' : '🤝 НИЧЬЯ');
                document.getElementById('duelMessage').innerHTML = `🏁 ДУЭЛЬ ЗАВЕРШЕНА!<br>Реальное движение: ${data.real_direction === 'up' ? '📈 ВВЕРХ' : '📉 ВНИЗ'}<br>${winText}`;
                showNotification(winText, isWinner ? 'success' : 'error');
                await loadUserStats();
            }
        } catch(e) { console.error(e); }

        setTimeout(() => resetDuel(), 4000);
    }

    async function loadUserStats() {
        try {
            const res = await fetch(`/api/user/stats/${userId}`);
            const stats = await res.json();
            document.getElementById('myRating').innerText = stats.duel_rating;
        } catch(e) {}
    }

    function resetDuel() {
        clearInterval(timerInterval);
        clearInterval(checkInterval);
        currentDuelId = null;
        myPrediction = null;
        document.getElementById('duelContainer').style.display = 'none';
        document.getElementById('findBtn').style.display = 'block';
        document.getElementById('findBtn').disabled = false;
        document.getElementById('findBtn').textContent = '🔍 НАЙТИ СОПЕРНИКА';
        document.getElementById('duelStatus').style.display = 'block';
        document.getElementById('duelStatus').innerHTML = currentMode === 'bot' ? '🤖 Выберите ИИ-бота' : '⚡ Выберите режим дуэли';
        document.getElementById('myPredictionArea').style.display = 'block';
        document.getElementById('myPredictionDisplay').innerHTML = '';
        document.getElementById('opponentPredictionDisplay').innerHTML = '';
        document.querySelectorAll('.duel-pred').forEach(btn => {
            btn.style.background = '';
            btn.style.color = '';
        });
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            if (currentMode === 'bot') {
                document.getElementById('botSelection').classList.remove('hidden');
                renderBots();
                document.getElementById('duelStatus').innerHTML = '🤖 Выберите ИИ-бота для дуэли';
            } else {
                document.getElementById('botSelection').classList.add('hidden');
                document.getElementById('duelStatus').innerHTML = '⚡ Поиск реального соперника';
            }
        });
    });

    document.getElementById('findBtn').addEventListener('click', findOpponent);
    initChart();
    loadUserStats();
</script>
</body>
</html>
